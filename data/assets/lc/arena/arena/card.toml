name = "Infinite Arena"
desc = """The Infinite Arena rises before you—a colossus that exists outside time.

One moment: sun-baked sand and white marble, surrounded by cheering thousands.
The next: void-blackness with gravity anomalies, starfleets maneuvering in silent combat.
The next: neon-lit chrome where cyborgs duel with laser blades.

The stands are always packed—mortals, demons, things that should not be. They hunger for spectacle.

The arena resizes itself to accommodate whatever must fight. Sword duels, fleet battles, dragon fights—the arena adapts. Spectators are never at risk; the arena isolates itself as needed.

Trumpets sound. The gates grind open. The crowd demands blood."""
