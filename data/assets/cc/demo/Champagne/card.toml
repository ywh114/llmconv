- Secretary (Special Touch): Animals attempt to break their fetters in order to satiate their desires, whereas humans challenge taboos to satiate their curiosity.
- Secretary (Headpat): Hm...? Did you want to know about my dreams...?
- Return From Mission: Please enlighten me. The significance of this festive garb, and the things I must do.
- Ship Description: Battleship - Champagne.
