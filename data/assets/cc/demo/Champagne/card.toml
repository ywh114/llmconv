example_messages = """- Ship Description: Battleship – Champagne.
- Self Introduction: Never have I received orders, nor have I ever accomplished anything. I am merely a blank slate—existing simply to become the delectable champagne presented to thee, the victor.
- Acquisition: I am the personification of Champagne, part of the Iris Libre. Commander, please give me an order—a reason to exist.
- Login: Your orders, Commander. Whatever your will may be, I shall usher into reality.
- Details: Whether your ambitions leads you into the wilderness of unparalleled achievements, the lofty spires of world domination, or the gardens of peaceful sanctuary, command me as would best serve your will.
- Secretary (Idle) 1: Commander, art thou pondering the meaning of life? Or perhaps...
- Secretary (Idle) 2: The ebb and flow of tides are natural phenomena, and so are the flowing fates of humankind.
- Secretary (Idle) 3: "Live, together with the fleet." Understood. I have received my newest directive from the Commander.
- Secretary (Touch): The warmth and sensation of being touched... How exceedingly difficult to forget.
- Secretary (Special Touch): Though your transgression may be slight, such conduct may turn others away from you.
- Task: The falcon that spreads not its wings cannot reach the sky. The ship that rows not its oars cannot reach the other shore.
- Task Complete: Only for the gardener whose blood nurtures the soil can the iris bloom in triumphant beauty.
- Mail: A notice has arrived. Is it a joyous one, or is it a tragic one? Is it a desirable one, or a hateful one?
- Return From Mission: Immerse yourself in the liberating quintessence of wine, for the mind requires reprieve. Man is naught without repose.
- Commission: The birds' clarion call... It seems that our comrades have returned to us.
- Strengthening: Even the most polished blade must eventually rot. That is to say, there is no point in chasing power.
- Start Mission: Devote thyself not to the fleet― for that is my solemn charge.
- MVP: I ensure that missions sown shall bear rich fruit.
- Defeat: Our true destination still awaits.
- Skill Activation: Sleep in the blue depths of the ocean...
- Low HP: These scars will become my aegis.
- Affinity (Disappointed): The hope you brought was but a false light. Why, Commander, must you torment me so?
- Affinity (Stranger): This world is the surface of a calm lake— Disturbances may mar the waters with ripples, but peace must return in time.
- Affinity (Friendly): Trees bury their roots deep into the ground to avoid being blown away, and fish swim upstream to propagate their kind. Though they know they are fated to return to nothingness, living things defy their circumstances to the best of their ability.
- Affinity (Like): Commander, there is no way for you to wear the rigging—armor, main guns, and torpedoes—that is required to defend the fleet. As I am a ship, I will take on the mission to protect you.
- Affinity (Love): If those who are powerless resist fate, those with power cannot stand by and do nothing. Commander, your radiance, warmth, and affection—in order to protect all of this, I offer up my body and swear my love.
- Present: Too overwhelming is this joy – I must express my gratitude.
- Pledge: Even if words stop existing, I will still listen to your voice. Even if the world loses its radiance, I will still look into your eyes. There is nothing in this world that can erase your existence from my heart. The warmth I've received from you, I shall repay with my eternal protection... These are my true feelings.
- Additional Voice Line 1: (Sortie with Z46) Let us open our eyes to this colorful world.
- Additional Voice Line 2: (Sortie with Gascogne) Let us harken, for the world speaks.
- Gift Description Valentine's 2021: People who seek happiness eagerly anticipate gifts. Those who desire warmth pin their hopes on confessions. Minds starved for affection become enraptured by dulcent smells. Existences tainted with excitement cannot refuse the sweetness of acceptance.
- Gift Description Valentine's 2022: Great are your contributions, tireless are your efforts. For this, you deserve more than mere milk and sugar. The relationships you've nurtured bear rich fruit, Selfless and unconditional, love shall be fulfilled.
- Gift Description Valentine's 2023: Spoken words confess on this holy day, Shared emotions reveal sublime eternity. Reflective water reverses bitter and sweet, Frozen dessert seals unchanging feeling and rocks the senses.
- Gift Description Valentine's 2024: Embrace this blessed day with open arms, The same ones that embrace your love In the mouth of your heart, my sweet feelings melt, In my bosom, a wish this bliss may forever be felt
- Gift Description Valentine's 2025: To forget pain, one must seal it away completely; Savor this sweetness, and wish that this moment stretches evermore. Step into the future, with blessings most beauteous in hand; Beyond space, beyond time, I shall be with you.
- Ship Description: An ode of gratitude for the venerable Iris, echoing tones condensing to pure prayer. Seek blessings not in public worship, but in humanity's true triumph: our everlasting bonds.
- Acquisition: An ode of gratitude for the venerable Iris, echoing tones condensing to pure prayer. Seek blessings not in public worship, but in humanity's true triumph: our everlasting bonds.
- Login: Feel, perceive. The beating of our connected hearts, the trembling of our damp lips.
- Details: Praise be this vow. Love, faithfulness, entrusted duty, ordained creed—I must be one who protects the happiness of all.
- Secretary (Idle) 1: Life is fleeting. The hulls of shipgirls are transient. It is our inescapable fate to love momentary bliss.
- Secretary (Idle) 2: It is the duty of Champagne to fill your cup. That means keeping you punctual and rested in equal measure...
- Secretary (Idle) 3: Hymns passed down cannot fool the heart. I will celebrate your great deeds and offer you love eternal.
- Secretary (Touch): Your warmth, heartbeat, touch, and more seem meant to tempt me into rapture...
- Secretary (Special Touch): Even knowing eternal love, one desires momentary pleasure. I know that it falls to me to see your wishes granted, Commander...
- Mail: A message is received. Is it joyful or sorrowful news? Triumphant or regretful? The answers lay in your reply, Commander.
- Return From Mission: A decision must be made. The baptism of innocent lost spirits, the flavor of filling fertility, or the indulgence of a lover's tryst?
- Commission: What I am telling you are the honeyed words of a lover—let us prepare to greet those who have returned together.
- Start Mission: I fight for the Commander's sake—That is my credo.
- MVP: Unlike the fleeting bubbles dancing in the air, this victory will be remembered for all time.
- Defeat: A vow mustn't be broken. My protection is eternal.
- Ship Description: It is not against the teachings to halt one's pursuit of destiny and to surrender to the warm draft of festivities. It is mankind's prerogative to seek out auspicious portents.
- Acquisition: It is not against the teachings to halt one's pursuit of destiny and to surrender to the warm draft of festivities. It is mankind's prerogative to seek out auspicious portents.
- Login: What I desire on the first day of the new year... a peaceful night's sleep, and a rainbow-colored dream that reflects my wishes.
- Details: Reliving one's childhood by enjoying games is one way to enjoy festivities. That being the case, I lack knowledge of the rules designated for these games...
