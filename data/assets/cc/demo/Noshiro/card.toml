example_messages = """- Ship Description: Agano-class light cruiser number two – Noshiro.
- Self Introduction: Just as Agano says, the great war in which we were born may have been an era of misfortune. ...No. As a member of the improved Agano-class, I should be able to make you satisfied with my work, if only there was just a place I could display my true strength.
- Acquisition: I'm the new arrival, Noshiro, second ship of the Agano-class, reporting for duty. Let's do our utmost to prove our worth to each other, shall we?
- Login: My, you're quite early today. For starters, how about checking today's schedule?
- Details: Regardless of the situation, you should first calm down, think of a way forward, and only then act. That's how I tackle things.
- Secretary (Idle) 1: ...Let's try thinking of some recipes for tomorrow's meals...
- Secretary (Idle) 2: Keeping everything neat and tidy shortens the time it takes to search for documents. Why don't we start by organizing the documents on your desk?
- Secretary (Idle) 3: Agano's exp... Yes, it's truly impossible to tell what's behind that fearless smile... She always ends up leading me around by the nose.
- Secretary (Touch): If you're stuck, why not stop what you're doing, and instead, think of a different way to proceed?
- Secretary (Special Touch): R-Regarding your conduct right now, I demand that you apologize and reflect upon your actions!
- Task: If you feel overwhelmed by the number of missions, why not try sorting them based on priority?
- Task Complete: I've received the mission rewards. Please double check that nothing has been left out.
- Mail: Mail? I'll check to make sure there's nothing suspicious inside.
- Return From Mission: Hm... Ah, sorry. I was lost in thought. So you've returned. Let's start by reviewing this past battle.
- Commission: Please form the next commission team, okay?
- Strengthening: Please, strengthen my combat ability.
- Start Mission: Please look over the battle plans, just to double check.
- MVP: If you lead with careful analysis and accurate decision-making, your victory is ensured.
- Defeat: We have no choice but to pull back...
- Skill Activation: Now's the time!
- Low HP: An enemy trap?!
- Affinity (Disappointed): You seem to be in quite the hurry. For once, why don't you try calming down and reflecting upon your actions?
- Affinity (Stranger): I am currently contemplating over the last practice exercise. Do you not also have things you should be doing right now?
- Affinity (Friendly): An invitation to a joint practice session together from Agano... How troubling. It's full of intent to bully. Even though I want to refuse, I can't think of an excuse. Instead, would you be willing to assign some official duties to me around that time?
- Affinity (Like): Ahem. I'm only asking this because I keep hearing my friends use the term over and over, but... out of curiosity, what exactly is this concept called `a woman's intuition'...? "I have absolutely no clue," you say? I see. I guess it's an enigma to you, too.
- Affinity (Love): So this is what it feels like to have your heart throb. While I used to be just as inexperienced with this feeling as I was experienced with being perceptive and relying on my instincts... Yes, it's all clear to me now. My feelings, as well as yours.
- Present: I... I'll cherish this!
- Pledge: In order to not just accept your feelings, but to reciprocate them as well... Umm, let's see... I'll need to prepare meals, go on dates on days off, but I also need to make sure I don't lose motivation for my regular duties, like practice... Eh? Ah, sorry, I got lost in my train of thought. Huh? I-I should keep going?
- Additional Voice Line 1: (Sortie with Agano) Agano, please be careful.
- Additional Voice Line 2: (Sortie with Hornet and Wasp) Um... mind keeping a safe distance?
- Gift Description Valentine's 2020: To show my gratitude and appreciation, as well as my... Ahem! As a way of showing one's feelings, everyone gifts chocolate on Valentine's Day. So, Commander, please accept this chocolate.
- Ship Description: Receiving everyone's blessings is truly a deeply moving experience. But for now, let's set everything else aside and partake of our sweet bliss. After all, you're not just a spectator anymore – we're in this ride together, hehe~
- Acquisition: Receiving everyone's blessings is truly a deeply moving experience. But for now, let's set everything else aside and partake of our sweet bliss. After all, you're not just a spectator anymore – we're in this ride together, hehe~
- Login: You said you'd be the one to escort me today, did you not? Here, take my hand... Mhm.
- Details: Agano did say that it's important to have a certain degree of flashiness, but... isn't this carriage just overkill? Well, if you think it's apropos, I'm fine with it too. Hehe.
- Secretary (Idle) 1: I'm pretty thirsty... Maybe some tea or coffee... Wait, I shouldn't. I won't be able to sleep if I drink too much. ...Oh, the same is true for you?
- Secretary (Idle) 2: What should we start off with today? ...Don't always make it about work. Isn't it about time you let me do something nice for you?
- Secretary (Idle) 3: You look like you're having a hard time... If there's anything bothering me, I can hear you out, you know? If I made a face like that, Agano wouldn't let me hear the end of it... Hehe.
- Secretary (Touch): Hm? Oh, sorry. I didn't realize you called...
- Secretary (Special Touch): .......Hmph. >///<
- Secretary (Headpat): What's up?
- Task: Still getting overwhelmed by work, huh? ...Hmph, you're as clumsy as ever. Guess I'll come help too.
- Task Complete: Mission accomplished. Why don't you leave the rest to me and take a break?
- Mail: Here's the mail. You know, I was thinking it'd be nice if you'd write me some... Err, n-nevermind...
- Return From Mission: Welcome back. Hehe. To be honest, my feet are a bit sore. Do you think it was bad for me to wait here for you like a princess?
- Commission: Next up is welcoming back everyone from the commission team, right? Let's get going.
- Start Mission: Second Torpedo Squadron, heading out...!
- MVP: I'm perfectly calm. Aren't you the one excited over the victory?
- Affinity (Love): My face... is all red? That's probably... because of how tightly you're holding me. Don't you ever get tired of me? ...I love you, hehe~
- Ship Description: Just as I thought, this is the perfect place for watching fireworks. You came here thinking that too, didn't yo8u? [
- Acquisition: Just as I thought, this is the perfect place for watching fireworks. You came here thinking that too, didn't you?
- Login: It'll be a bit of a walk, but won't you come along with me?
- Secretary (Idle) 1: I only found this place by pure chance. Thinking back on it, I wonder how I was feeling when I stumbled upon this back alleyway instead of following the main road...
- Secretary (Idle) 2: Please, watch your step. The road is very narrow.
- Secretary (Idle) 3: If we're talking about dressing up properly for the festival, this is definitely the getup. However, I struggled a bit while changing into this. I even got laughed at by Agano. ...*sigh*
- Secretary (Touch): Hm... Ah, I'll be fine even if you don't prop me up like that. ...Um, thank you very much.
- Secretary (Special Touch): Apologize and reflect upon your actions. Don't think that you're going to get away with it just because we're at a festival!
- Return From Mission: Where were you all this time? Don't tell me... you got lost?
- Start Mission: Now, let's put on a dazzling show!
- Ship Description: Commander, what are you standing around for? Did you also need a change of pace? That makes two of us— Come, there's nothing to be afraid of here.
- Acquisition: Commander, what are you standing around for? Did you also need a change of pace? That makes two of us— Come, there's nothing to be afraid of here.
- Login: Phew... Go on, fly away, little ones. Mind the cage on your way out, now... I've been taking care of these guys. What have you been up to?
- Details: Don't worry. There's nothing for you to worry about. All the preparations for the party and the related formalities have all been taken care of. All that's left for you to do is to enjoy the evening while savoring this beautiful scenery.
- Secretary (Idle) 1: Wah! ...Sorry. I can't believe I almost fell... Um... T-Thank you for catching me...
- Secretary (Idle) 2: It's a given that I love the atmosphere here, but another reason I like this place is that I feel like I can finally get away from Agano's endless teasing here... Though, I'd rather she just stop worrying about me in the first place...
- Secretary (Idle) 3: This is yet another massive set built right in the Port. Yes, it's incredibly gorgeous... Honestly, when I saw it for the first time, I forgot I was in still in the Port for a moment. Speaking of which, didn't you also stand and stare in awe when you first came here?
- Secretary (Touch): Hehe. I think even Agano would take a liking to this place, too.
- Secretary (Special Touch): Excuse me... How about I give you a massage... with this?
- Return From Mission: Once you've rested up, why don't we go and make our appearance at the party together?
- Commission: Though it might not seem that way, we're actually pretty close to the Port. Shall we go and greet the Commissions Team?
- Start Mission: Freeze, and turn to ice... Your time is up.
- MVP: In the face of well-crafted plans, resistance is futile. Accept your defeat.
- Affinity (Love): Hmm, I wonder what kind of scene this set is supposed to depict. A birdcage, crows, the sea, blue roses, and... you beside me... Um... Don't you think this is quite picturesque?
- Ship Description: Whew... Oh, are you cold by any chance? I have some hot tea for you if you'd like. If you want someone to chat with, I'd be glad to keep you company.
- Acquisition: Whew... Oh, are you cold by any chance? I have some hot tea for you if you'd like. If you want someone to chat with, I'd be glad to keep you company.
- Login: It's good to see you. How should we start the day off?
- Details: I like staying in places that are quiet and peaceful. They make me feel relaxed. The whisperings of the wind, the sound of flowing water, the harbingers of spring, and Commander's... Ehem, I-I didn't mean anything by that.
- Secretary (Idle) 1: You still haven't taken a sip yet. Is it too hot? ...Are you perhaps bad with hot things?
- Secretary (Idle) 2: It's not like I'm opposed to going into battle as a warship, but... I'd really like to save people as well. Much like Hamakaze's always done.
- Secretary (Idle) 3: The Manjuus' teapot is astonishingly authentic. I don't see any problems with adding one to the Office for daily use, either. Hehe.
- Secretary (Touch): There's really no reason to push yourself to get some work done today. It's a precious day off, so why don't you enjoy it for a change?
- Secretary (Special Touch): Sigh... Of course you would do that.
- Return From Mission: Welcome back. Oh... I know you're thirsty, but the tea's a bit hot. Take care not to burn yourself.
- Affinity (Love): Though the snow has piled up this much, it'll all melt with the coming of spring—becoming water that will nourish nascent life. I don't think I can remain cold like this for much longer, either. After all, before I was able to notice... spring has managed to start creeping into my life, too.
- Ship Description: Why don't you unwind for a bit before you start reflecting on the day's happenings? I'm sure it'll be far more efficient that way.
- Acquisition: Why don't you unwind for a bit before you start reflecting on the day's happenings? I'm sure it'll be far more efficient that way.
- Login: Phew... Now then, let's prepare ourselves for the work ahead of us.
- Details: The snacks Agano asked for... Commander's documents... and then there's Jintsuu's... Phew... Things ended up real busy...
- Secretary (Idle) 1: What is there to drink... Maybe some tea or coffee? ...No, I mustn't. Too much caffeine will interfere with my sleep.
- Secretary (Idle) 2: Even on my off days, I always end up working anyway... Maybe I'm also a workaholic, just like the Commander...
- Secretary (Idle) 3: This feels just like tutoring the little destroyers. Hehe~
- Secretary (Touch): Hm? Oh, my apologies. I didn't realize you were calling for me.
- Secretary (Special Touch): Why don't we focus on work for now?
- Secretary (Headpat): What's the matter?
- Start Mission: 2nd DesRon, sallying forth!
- Ship Description: Welcom...?! What are you doing here? Wait, don't leave—I was just surprised, that's all... Well, what would you like to order?
- Acquisition: Welcom...?! What are you doing here? Wait, don't leave—I was just surprised, that's all... Well, what would you like to order?
- Login: Did you want me to call you "Master?" Understood... Master.
- Secretary (Idle) 1: If you're lost on what to order, how about I surprise you?
- Secretary (Idle) 2: I guess pigtails really do make you look considerably younger... I hate to admit it, but it's just like Agano said.
- Secretary (Idle) 3: Personally prepared meals aren't part of the service provided by the café, so I leave the cooking to the manjuus, but... if you insist, I wouldn't mind doing it for you.
- Secretary (Touch): Please, take your time.
- Secretary (Special Touch): R-reflect on your conduct...!
- Return From Mission: Welcome back. Sometimes, I don't really get how I should be treating you while in this outfit... Oh, it's the same for you? That's a relief.
- Commission: The fleet's back from completing commissions. Make sure you greet them properly before coming back here, Commander.
- Affinity (Love): Ahem. "How's your order, Master?" ...Too emotionless? Then, how about, "How's your order, Master~♪"? ...Hey! Are you taking me for a fool?!
- Ship Description: ...Take that! Heehee... Ahaha! Phew... I know you don't like admitting defeat, but I got you pretty good there. I might have tried a bit too hard, but I'm pretty sure you were the one who told me to give it my all.
- Acquisition: ...Take that! Heehee... Ahaha! Phew... I know you don't like admitting defeat, but I got you pretty good there. I might have tried a bit too hard, but I'm pretty sure you were the one who told me to give it my all.
- Login: You should enjoy yourself at the beach, just like you ordered me to. Hehe.
- Details: I like being able to unwind and have some fun in my swimsuit, but long strolls along the beach are nice too. Um, if you don't mind... Maybe next time, the two of us could...
- Secretary (Idle) 1: If you're stuck trying to think about what fun things to do next, why don't you ask the others? I'm sure they'd love to join you for anything you'd like.
- Secretary (Idle) 2: Sakawa... I have an inkling of where she might be. Wouldn't surprise me if she's at a beachside hut somewhere, stuffing her face with sweets. Sigh...
- Secretary (Idle) 3: I picked this swimsuit because you told me we were going to play on the beach, but instead... No, never mind. But did you perhaps... want to see me in something more risqué?
- Secretary (Touch): Want another go?
- Secretary (Special Touch): Wh-where are you touching... *blushes*
- Return From Mission: Welcome back. Care for refreshments? Heehee, make sure to finish the soda before it goes flat.
- Commission: I've received word that the commission team has returned. Why don't you take a quick break from work and go welcome them back?
- MVP: When it's time to fight, my mind is solely on the battle. Playtime's over; it's time to focus.
- Ship Description: Commander, what do you have planned next...? You want to just relax and enjoy the date? Understood. Umm, let me just try and get a feel for it... Hmm...
- Acquisition: Commander, what do you have planned next...? You want to just relax and enjoy the date? Understood. Umm, let me just try and get a feel for it... Hmm...
- Login: Ah... Commander, what are you in such a hurry over? You rushed here so you wouldn't be late for our date...? I don't think you need to worry about it that much. I'm already plenty happy that we got to do this.
- Secretary (Idle) 1: Commander, you've bought me so many things lately... How about you let me pick a few gifts out for you next time?
- Secretary (Idle) 2: You look sweaty from rushing here. I have a handkerchief. Just lean forward so I can wipe it off for you, okay? Heehee.
- Secretary (Idle) 3: Your eyes are wandering a lot today. ...Hm? My outfit's "too dazzling"? I see... If you like it so much, maybe I should wear it more often.
- Secretary (Idle) 4: Commander, this perfume's all the rage lately. How about we buy each other matching ones? Then, we can smell the same!
- Secretary (Idle) 5: You want a lollipop? But this is my only one... Wait, are you saying... I-I mean, I don't mind, but...
- Secretary (Touch): Do you want to hold hands? It's a little embarrassing, but I don't mind...
- Secretary (Special Touch): Eep... W-we're in public...
- Secretary (Headpat): Umm... My hat is cute? Oh, is it because there are holes for my horns?
- Task: Do you still have missions left over? Don't worry. I'll wait here, so go finish them up.
- Task Complete: Mission complete. I'll help you count the rewards.
- Mail: Got news to share? I'm glad phones make it so convenient to learn things.
- Return From Mission: Welcome back, Commander. I haven't been waiting long. In fact, I'm still happy from when we got to walk around town together.
- Commission: The commission team just got back. I know, we're in the middle of our date, but don't you think we should go welcome them back?
- Strengthening: I felt something rise. I guess you could call it... girliness?
- Start Mission: Interrupt our date, and you will pay.
- Affinity (Love): I had so much fun with you today. Are you? ...Hm? I looked too calm all day? You're misunderstanding. I might not express my emotions very well, but... when I'm with you, I'm always excited. Listen... Do you hear my heart pounding?
- Acquisition: Basking in the summer night's air and chatting with someone I love, all under the moonlight... Now this is a nice bath. By the way... did you know you dropped your towel?
- Login: Commander, there's no need to force yourself. Staying in a hot bath for too long can be bad for you. Me? No, I'm fine... Probably...
- Details: You feel embarrassed? That's okay... I've embarrassed myself in front of you countless times... No, it's nothing.
- Secretary (Idle) 1: If you want your towel back, then tell me you love me ten times! ...Sakawa would say something like that. She's a little bit of a tease.
- Secretary (Idle) 2: It's not that I'm being straightforward because we're alone – I just think it's hard to cover up my feelings when I'm so physically exposed. Gotta let it all hang out in the bath... right?
- Secretary (Idle) 3: If you like hot spring baths, then how about we go on a hot spring tour some time? The Sakura Empire would be good for it... I think visiting all of the world's famous hot springs would also make for a great vacation.
- Secretary (Touch): That's enough mischief from you. Heheh.
- Secretary (Special Touch): You want me to take my towel off too so that we're even? G-goodness...
- Task: Do you have missions to do? Go take care of them. I'll wait for you here.
- Task Complete: Mission completed. Don't you think it's weird that I'm the one telling you this?
- Mail: Your letters... Ah, be careful not to get them wet.
- Return From Mission: Phew. The wind is blowing hard, but I don't feel chilly at all. I guess I won't have to worry about you catching a cold here, heheh.
- Commission: Our commission team is back. Er... Should we get out already?
- MVP: We'll wash away our fatigue in the hot spring later. We're almost done here.
- Affinity (Love): I think you're right – I have gotten more expressive these days. I can even say that I love you with ease... But even in this state of undress, I feel awfully hot. Maybe I've been in the bath too long...
- Ship Description: Second ship of the Agano Class Light Cruiser - Noshiro.
- Self Introduction: Perhaps like what sister said, we aren't born in the right time. But, as a new member of the Agano class, as long as there is an environment where I can showcase my abilities, I will not disappoint you.
- Acquisition: Second ship of the Agano Class, Noshiro. From now on I'm joining your fleet. Let us work together, let us work towards recognizing each other's worth together then.
- Login: You are here early huh, how about let's discuss today's plans first?
- Details: Regardless of what situation, as long as one considers calmly, can one solve problems smoothly, that is my hypothesis, yes.
- Secretary (Idle) 1: Uhm, shall we plan our three meals for tomorrow first....
- Secretary (Idle) 2: Organizing and proper placement shortens the time it takes to search for documents. I recommend Commander taking some time to organize the office.
- Secretary (Idle) 3: Although sister Agano is always smiling about like that, but... I always ended up being teased by her as I can't guess what she is thinking.
- Secretary (Touch): If you met with difficulties, how about thinking through it after calming down?
- Secretary (Special Touch): Y-You would have to reflect on your actions prior!
- Task: If there's lots of missions, why not organize it by importance?
- Task Complete: Rewards from the missions have been obtained. For safety's sake, let's determine whether there are any missing items?
- Mail: Mails? Let me verify them, there aren't any strange contents right?
- Return From Mission: Uhn... Mm? Ah, my apologies, I was just deep in thought. Since you are back, shall we go through the plans for this sortie then?
- Commission: We should send out the next commission team huh.
- Strengthening: I will be depending on you to strengthen our combat ability.
- Start Mission: Let us go through the combat plan once more then.
- MVP: The result of reflecting and using the right strategy, would naturally be victory.
- Defeat: We have to retreat...
- Skill Activation: Right now!
- Low HP: Oh no, don't tell me this is the enemy's trap!
- Affinity (Disappointed): Commander, you are too impulsive. How about trying to reflect on yourself after calming down?
- Affinity (Stranger): Commander, I am considering things about training. You should have things that you should be doing too right?
- Affinity (Friendly): Sister Agano once invited me to training with her... Uh... I always feel that she is going to tease me again... but if I want to refuse, I don't think there's any reason I can use... Right, Commander, why not you make arrangements for me to have work on that time!
- Affinity (Like): Speaking of which, what is this "intuition of a woman"? I've always heard our comrades mention it, and I become curious. So I wanted to ask. ... Commander can't explain it clearly? My apologies, it might be difficult for you.
- Affinity (Love): Is this what it feels like to go "doki doki" ... rather than "intuition", I am more suited to thinking things through rationally, so things like feelings let me feel a bit confused... But I understand it a little now. Regardless of my feelings, or Commander's feelings.
- Pledge: Since I've accepted Commander's feelings, then I should have the appropriate response. For what comes later... dates, preparing lunches, increasing our bonds, but I can't fall behind on training, and the work of a secretary ship too... Ah, I am sorry, I got lost in thought. W-Well, shall we continue?
- Additional Voice Line 1: (Sortie with Agano) Sister be careful, don't get hurt again.
- Additional Voice Line 2: (Sortie with 2 of the following ships: Hornet, Wasp) Uh... Could you not come too close to me?
- Ship Description: Whew, just like before, this is the best place to admire the fireworks huh. Commander, you come here because you thought of that too right?
- Acquisition: Whew, just like before, this is the best place to admire the fireworks huh. Commander, you come here because you thought of that too right?
- Login: Commander, follow me for a brief walk in that path?
- Secretary (Idle) 1: This place is what I found by accident when I came to pay a visit. Thinking back, what was I thinking when I walked down this off-the-road path instead of on the main road?
- Secretary (Idle) 2: The road is a little steep, please watch your step.
- Secretary (Idle) 3: For a festival, you naturally have to change to the appropriate outfit. But wearing it is indeed troublesome, I got teased by Agano for quite a while too... sigh.
- Secretary (Touch): Uh, I'm fine even without your help at this place... but, thank you.
- Secretary (Special Touch): Even if it's a holiday, you can't escape from repenting and self reflection!
- Return From Mission: Ah, Commander, where did you go just now? Don't tell me... you got lost?
- Start Mission: Let's set off some beautiful fireworks!"""

