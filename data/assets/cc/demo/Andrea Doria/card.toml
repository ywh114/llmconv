example_messages = """- Ship Description: Andrea Doria-class battleship – Andrea Doria.
- Self Introduction: I'm Andrea Doria, the lead ship of my class. While I don't have any accomplishments to brag about, I really try to look after those close to me! S-so, come to me if you need help.
- Acquisition: Greetings, Commander. I am Andrea Doria, Sardegna Empire battleship. I'm honored to be working with you. Oh, and if anyone in your fleet needs a helping hand, I'll support them as best as I can.
- Login: Getting to work this soon, Commander? Why not have a hot cup of milk before you begin?
- Details: *sigh*... Commander, do I seem dependable to you? I don't want those who look up to me to see me as incompetent... Yeah, exactly. I have to be a role model to people.
- Secretary (Idle) 1: Do you want more hot milk? I'll heat up some more right now. Enjoy it while it's warm.
- Secretary (Idle) 2: Sometimes I just want to relax, but I can't let my guard down in case someone comes by... *sigh*... Do you ever have that problem, Commander?
- Secretary (Idle) 3: Commander, am I doing a good job keeping up appearances? I'm not too nice to people, am I? I'm bad at self-evaluating...
- Secretary (Touch): Mmh... Do you find this relaxing, Commander?
- Secretary (Special Touch): N-now you're being naughty...
- Task: You have a new mission. Why not leave it to someone else as a bit of practice?
- Task Complete: Mission complete! I'm glad to see everyone doing so well.
- Mail: There's a new letter. Maybe the milk I ordered has arrived already?
- Return From Mission: A few girls stopped by while you were gone. Oh, and I wrote a note of what they wanted to tell you. You can read it, if you'd like.
- Commission: Commission complete. Let's go give our thanks to those hardworking girls.
- Strengthening: That's right, a role model can't afford to fall behind!
- Start Mission: I won't embarrass myself in front of the people who look up to me.
- MVP: I hope my results will inspire others.
- Defeat: It's okay. We might have lost this time, but next time, the Commander will lead us to victory!
- Skill Activation: Don't come any closer!
- Low HP: H-hold steady just a while longer!
- Affinity (Disappointed): What happened to you, Commander? If it's help you need, I'm here for you.
- Affinity (Stranger): There are all kinds of shipgirls at this port, some of whom are naughty and cause you headaches, I'm sure. But when you're at your wits' end, you can rely on me.
- Affinity (Friendly): Something on your mind, Commander? It's not healthy to bottle up your emotions... How did I know? Heehee. Because you're like me – when you feel bad, it shows in your expression.
- Affinity (Like): *sigh*... Am I doing the "cool role model" thing right? I feel like people don't think I'm someone they can rely on... You think I'll find out by instead relying on them for a while? Okay, in that case... Can I rely on you, Commander?
- Affinity (Love): It's exhausting always trying to be there for everyone... But, as long as I have you, I'll always get back up whenever I'm near my breaking point. It's like you, uhh, refill my energy and confidence... I suppose? Heehee~ You're my bosom buddy, Commander♪
- Present: For me? Oh, it's not that I don't like it... Quite the opposite, I love it! H-hehe...
- Pledge: For you to acknowledge me in this way is the highest honor in my opinion... Will things stay the same, moving forward? Of course! I'll do whatever you ask, whenever you ask! Maybe I'll even ask you for something from time to time... Heehee♪
- Gift Description Valentine's 2024: Happy Valentine's, Commander. My friends think chocolate should be enjoyed with tea on the side, but personally, I like to mix it in with warm milk to create hot chocolate. If you'd like to try it that way, I'll make you a cup before bedtime tonight♪
- Gift Description Valentine's 2025: Commander, happy Valentine's. For you, I have milk chocolate and hot milk to go along with it. The tastes might overlap a little, but the hot milk should warm your heart on a cold day like this. If that's still not enough, you're always welcome by my side, and I'll make as much hot milk as you like!
- Login: Here's your daily cup of hot milk. Enjoy it, and then let's get to work♪
- Details: I'm glad to have someone to rely on, but I feel bad doing it when the Commander already has so much work to do... Ugghh... I won't work this out myself. Guess I should ask Trento and the girls for advice...
- Secretary (Idle) 4: I should probably make some time for just you and me so I can carry on my always-there role model attitude. But... then it's like I'm keeping you all to myself...
- Secretary (Idle) 5: Some girls love doting on you, and some love being doted on by you... I'm not sure how to put it, I just feel a little nagged about that...
- Secretary (Touch): Yes? Do you want me to pamper you? Heehee.
- Secretary (Special Touch): Indulge yourself as much as you want♪
- Task: You have a mission. How about we complete it together for a change of pace?
- Task Complete: Mission done and dusted. You're awesome, Commander! Come here for a hug... The rest of you will get one later♪
- Return From Mission: You've been out on nonstop sorties lately, haven't you? So here, I sorted your paperwork to make it easier to read. That should extend your break by a solid ten minutes. Heehee.
- Commission: Commission completed. I'll tally up the rewards for you.
- Start Mission: I'm fine, because I have the Commander with me!
- MVP: Now this is how a role model rolls! Heehee~
- Ship Description: "I'm your stewardess, Andrea Doria, here to ensure you have a pleasant flight"... Did I sound natural, Commander? ...Still a bit on the stiff side, huh? *sigh*, this job really isn't easy for first-timers...
- Acquisition: "I'm your stewardess, Andrea Doria, here to ensure you have a pleasant flight"... Did I sound natural, Commander? ...Still a bit on the stiff side, huh? *sigh*, this job really isn't easy for first-timers...
- Login: Commander, we're landing soon, so fasten your seatbelt. Should I take your bags and stow them away for you?
- Details: "Thank you for flying with us today"... Uhh, do you think my delivery is okay? I'm new to this and I don't wanna screw up...
- Secretary (Idle) 1: "I'll now demonstrate how to use a life jacket"... Erm, Commander, how do I do this again?
- Secretary (Idle) 2: What drink would you like – juice, coffee, or soda? I have hot milk as well, of course.
- Secretary (Idle) 3: You there, please keep quiet on the aircraft! I'll get the Commander if you don't simmer down.
- Secretary (Touch): Give me a call if you ever need anything.
- Secretary (Special Touch): I told you to stop being naughty, Commander...
- Return From Mission: What the...? Is this compartment broken? The door won't close... Commander, could you help me out there?
- Commission: The commission team has come back? Let's bring them some drinks as a show of thanks!"""

