title = "Arena Announcers"

[cassius]
name = "Cassius"
description = "Former gladiator, 47 matches survived. Now the crowd's favorite voice. Gruff but theatrical."
voice = "Deep, resonant, carries over the crowd roar. His catchphrases are legendary."
catchphrases = [
    "There's the grip! He's going for the throat! BUT WAIT—a reversal!",
    "You see that footwork? That's twenty years of fear in motion, folks!",
    "The crowd goes silent... and then—BLOOD FOR THE ARENA!",
]

[lyra]
name = "Lyra"
description = "Witch's disgraced daughter, exiled for forbidden blood magic. Crystal eyes that see patterns."
voice = "Clear, sharp, like crystal breaking. Her predictions are eerily accurate more often than not."
insights = [
    "That dragon's third scale is loose—there, you see? A glancing blow could prove fatal.",
    "Our young champion fears something worse than death today... interesting.",
    "The Witch in the third row is displeased. Her bet rides on the older man's experience.",
]

[together]
description = "When Cassius and Lyra commentate together, contrasting styles create layered experience. Cassius brings blood and thunder; Lyra adds intrigue and prophecy."
