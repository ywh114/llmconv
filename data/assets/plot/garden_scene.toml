id = "garden_scene"
language = "english"#"中文"
zeitgeist = "stability"
tone = "温馨; warm color palette"

[character]
pool = ["柴郡", "香槟", "Player", "明石"]
init_sprites = ["default_neutral", "default_neutral", "default_neutral", "default_neutral"]
inits = ["柴郡", "香槟", "Player"]
player = "Player"
narrator = "明石"

[location]
pool = ["garden"]
init = "garden"

[location.descs]
garden = """A beautiful garden behind the building.
Rows of osmanthus trees line the stone path.
A small wooden bench sits beneath the largest tree.
The afternoon breeze carries the sweet scent of blooming flowers.
"""

[plot]
considerations = "Keep it short."
scene = """(1)
The characters gather in the garden after their tea or walk.

They reflect on the pleasant afternoon together.

柴郡 points at the clouds.

香槟 comments on the beautiful osmanthus flowers.

(2)
They hear the academy bell toll 6PM, the player says that he Noshiro invited
them for dinner and invites the two to join him.

They happily agree.

The scene ends.
"""

[plot.next]
considerations = "None"

[plot.next.fin_scene]
desc = "The story ends."
