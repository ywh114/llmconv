id = "walk_scene"
language = "english"#"中文"
zeitgeist = "stability"
tone = "温馨; warm color palette"

[character]
pool = ["柴郡", "香槟", "Player", "明石"]
init_sprites = ["default_neutral", "default_neutral", "default_neutral", "default_neutral"]
inits = ["柴郡", "香槟", "Player"]
player = "Player"
narrator = "明石"

[location]
pool = ["aisle", "building_courtyard"]
init = "aisle"

[location.descs]
aisle = """An aisle running east-to-west.
The late afternoon sunlight streams through the large windows near the ends.
The air smells of fresh spring breeze.
"""
behind_office = """A courtyard behind the port office where shipgirls often
gather after work. Today, the three characters are out early so there is nobody
else in sight.
There is plenty of greenery and there is a trail that leads all the way to the
Eagle Union dorms. The air is cool and fresh here.
"""

[plot]
considerations = """Keep it medium length."""
scene = """(1)
The characters take a leisurely walk down the `aisle`.

香槟 says they should go to the courtyard.

柴郡 agrees, while chattering about the contents of the book she just found.

The scene transitions to `building_courtyard`.

(2)
They stop and listen to the seabirds for a while, and 柴郡 remarks that it's too
early so nobody else is around.

柴郡 suggests to go to the garden.

The Player should agree, and the scene ends.
"""

[plot.next]
considerations = "None"

[plot.next.garden_scene]
only_for = ["walk_scene"]
desc = "After the walk, go to the garden."
