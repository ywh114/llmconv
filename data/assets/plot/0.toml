id = "break_scene"
language = "english"#"дёӯж–Ү"
zeitgeist = "stability"
tone = "жё©йҰЁ; warm color palette"

[character]
pool = ["жҹҙйғЎ", "йҰҷж§ҹ", "Player", "жҳҺзҹі"]
init_sprites = ["default_neutral", "default_neutral", "default_neutral", "default_neutral"]
inits = ["жҹҙйғЎ", "йҰҷж§ҹ", "Player"]
player = "Player"
narrator = "жҳҺзҹі"

[location]
pool = ["building_break_room", "building_storage_room", "building_aisle"]
init = "building_break_room"

[location.descs]
building_break_room = """A break room.
Large square room with large windows on the north.
A table with books in the middle of the room.
Two chairs in the southwest corner.
The room is brightly lit.
A door on the south wall.
"""
building_storage_room = """A storage room.
Small rectangular room with no windows.
Closets against the west, south and east walls.
Lights are on, the room is dimly lit.
A door on the north wall.
"""
aisle = """An aisle running east-to-west.
Quite spacious, with large windows near the ends.
Connects the northern `building_break_room` with the southern `building_storage_room`.
"""

[plot]
considerations = """Keep it short."""
scene = """(1)
жҹҙйғЎпјҢйҰҷж§ҹпјҢand Player begin in `building_break_room`.

They converse a bit about random things for a few rounds.

Think of a smooth transition, after which жҹҙйғЎ begins talking about her lost book. йҰҷж§ҹ says to look for it in `building_storage_room`.

(2)
They enter the `building_aisle`; there is a narration:
A short narration about the characters entering the aisle and about the warm afternoon sunlight slanting through the window.

Champagne remarks on the evening clouds.

They enter the `building_storage_room`.

(3)
A short narration describes the dusty room, and they look around.

Eventually, the book is found on top of a closet by йҰҷж§ҹ, and the Player
retrieves it.

жҹҙйғЎ hugs йҰҷж§ҹ and the Player in delight.

They re-enter the `building_aisle`.

(4)
йҰҷж§ҹ asks the others to take a walk, while жҹҙйғЎ invites the others for tea.

The scene ends.
"""

[plot.next]
considerations = "None"

[plot.next.tea_scene]
only_for = ["break_scene"]
desc = "If going for tea."

[plot.next.walk_scene]
only_for = ["break_scene"]
desc = "If going for a walk."
