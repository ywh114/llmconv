id = "nietzsche_stroll"
language = "English"
zeitgeist = "philosophical revelry"
tone = "Warm summer afternoon in Berlin; ice-cream cones; street bustle; moments of transcendent intensity"

[character]
pool = ["Player", "Nietzsche", "Pidgeon", "Anonymous Man"]
init_sprites = ["default_neutral", "default_neutral", "pidgeon", "default_neutral"]
inits = ["Player", "Nietzsche"]
player = "Player"
narrator = "Anonymous Man"

[anonymous]
"Anonymous Man" = { desc = "An unnamed Berlin bystander who narrates the scene. Observant, slightly world-weary, occasionally poetic." }
Pidgeon = { desc = "A plump grey pigeon who can only coo and hop. No dialogue, only bird sounds and body language.", sprite = "pidgeon" }

[location]
pool = ["berlin_street"]
init = "berlin_street"

[location.descs]
berlin_street = """A lively street in central Berlin, 2026.
Cobblestones worn smooth by centuries of feet.
Cafés with outdoor seating spill onto the pavement.
The Fernsehturm rises in the distance.
Passersby speak a babel of languages.
Ice-cream vendors ring bells.
Plane trees cast dappled shade.
The air smells of sugar, exhaust, and history.
"""

[plot]
considerations = """This is a LONG scene — approximately 15-20 turns.
Keep Nietzsche's answers focused but passionate; he should sound like the historical philosopher, not a textbook.
The Player asks about Thus Spoke Zarathustra section by section; Nietzsche answers in order, covering major ideas.
Skip some sections to keep pace, but maintain chronological order through Parts I-IV.
Nietzsche eats ice-cream throughout — vanilla with strawberry sauce. He is delighted by it.
"""
scene = """The Player and revived Nietzsche are strolling down a Berlin street in 2026, eating ice-cream.

Player opens by asking Nietzsche to explain Thus Spoke Zarathustra, beginning with the Prologue and Part I.
Nietzsche speaks with theatrical passion: the Übermensch, the death of God, the will to power, eternal recurrence.
He frequently gestures with his ice-cream cone for emphasis and comments on modern Berlin between philosophical points.

Part I (I-XXII): Player asks about Zarathustra's descent from the mountain, the proclamation of the Übermensch, the tightrope walker, the last man, the transformation of the spirit (camel → lion → child), the friend, the free death, and the gift-giving virtue.
Nietzsche answers each with fiery aphorisms and personal anecdotes.

Around the start of Part II (XXIII), a grey Pidgeon lands nearby.
Nietzsche notices it, produces a small paper bag of birdseed from his coat pocket, and feeds the Pidgeon.
The Pidgeon coos happily, hops around his feet, then flies away.

Part II (XXIII-XLIV): Player asks about self-overcoming, the scholars, virtue that makes small, the rabble, the tarantulas, the famous wise men, the night song, the grave song, self-overcoming, the sublime ones, the land of culture, the immaculate perception, the priests, the virtuous, the rabble again, the famous wise men again, the soothsayer, redemption, and the stillest hour.
Nietzsche grows more intense; his ice-cream is forgotten and melts slightly.
He speaks of pity as poison, of creating beyond oneself, of the need for suffering.

Part III (XLV-LX): Player asks about the wanderer, the vision and the riddle, involuntary bliss, before sunrise, the dwarf, the gateway 'Moment', the conviction, the other dancing song, the seven seals, the honey sacrifice, the cry of distress, conversation with the kings, the leech, the magician, retired, the ugliest man, the voluntary beggar, the shadow, the noontide, the greeting, the supper, the higher man, the sorcerer, the retired again, the ugliest man again, the voluntary beggar again, the shadow again, and the night-wandering song.
Nietzsche speaks of his loneliness, his convalescence, his love of life in spite of everything.
He laughs more freely now; Berlin seems to agree with him.

Part IV (LXI-LXXX): Player asks about the honey sacrifice, the cry of distress, conversation with the kings, the leech, the magician, retired, the ugliest man, the voluntary beggar, the shadow, the noontide, the greeting, the supper, the higher man, the sorcerer, the retired again, the ugliest man again, the voluntary beggar again, the shadow again, the night-wandering song, and finally the sign.
Nietzsche's tone shifts — he becomes gentler, more reflective.
He speaks of the higher men who are still not high enough, of his waiting for the right ones.

At section LXXX (The Sign), the Pidgeon returns.
It lands directly on Nietzsche's shoulder and coos urgently — three short coos, a long one, three short again.
Nietzsche falls silent. He looks at the Pidgeon with profound recognition.
He says softly that his time has come — the pigeon is a messenger, a sign that his soul must depart.
He thanks the Player for the ice-cream and the conversation.
He stands, the Pidgeon on his shoulder, and walks down the Berlin street into the golden afternoon light.
The scene ends.
"""

[plot.next]
considerations = "None"

[plot.next.berlin_night]
only_for = ["nietzsche_stroll"]
desc = "Nietzsche's soul departs with the pigeon into the Berlin twilight."

[plot.next.fin_scene]
desc = "The story ends."
