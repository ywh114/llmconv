category = "elemental"
# Fire-elemental ability entries.

_prefix_values = [
    { value = "pyro", suffixible = true },
    { value = "igni", suffixible = true },
]

_suffix_values = [
    { value = "", prefixable = true, suffixible = false },
    { value = "burn", prefixable = true, suffixible = false },
    { value = "blaze", prefixable = true, suffixible = false },
    { value = "flare", prefixable = true, suffixible = false },
]

_domain_values = [
    { value = "inferno", suffixible = false },
    { value = "ash", suffixible = false },
    { value = "scalding", suffixible = false },
    { value = "cinder", suffixible = false },
    { value = "wildfire", suffixible = false },
    { value = "magma", suffixible = false },
]

_fire_melee_values = [
    { value = "scorch", suffixible = false },
    { value = "blaze", suffixible = false },
]

_fire_area_values = [
    { value = "explosion", suffixible = false },
    { value = "eruption", suffixible = false },
    { value = "airburst", suffixible = false },
]

_fire_ranged_values = [
    { value = "incineration", suffixible = false },
    { value = "blast", suffixible = false },
    { value = "eruption", suffixible = false },
    { value = "torrent", suffixible = false },
]

_fire_status_values = [
    { value = "kindle", suffixible = false },
    { value = "immolation", suffixible = false },
]

_fire_defence_values = [
    { value = "backdraft", suffixible = false },
    { value = "smother", suffixible = false },
]

_fire_movement_values = [
    { value = "propellent", suffixible = false },
]

other = [
]

_noun_values = [
    { value = "pyre", suffixible = false },
    { value = "ember", suffixible = false },
    { value = "inferno", suffixible = false },
    { value = "magma", suffixible = false },
    { value = "blaze", suffixible = true },
    { value = "cinder", suffixible = true },
    { value = "flare", suffixible = true },
    { value = "rocket", suffixible = true },
]

_adj_values = [
    { value = "searing", suffixible = false },
    { value = "blazing", suffixible = false },
    { value = "scorching", suffixible = false },
    { value = "smoldering", suffixible = false },
    { value = "blistering", suffixible = false },
    { value = "burning", suffixible = false },
    { value = "roaring", suffixible = false },
    { value = "flaming", suffixible = false },
]


[["melee"]]
patterns = ["{_fire_melee_values}"]

[["area"]]
patterns = ["{_fire_area_values}"]

[["ranged"]]
patterns = ["{_fire_ranged_values}"]

[["status"]]
patterns = ["{_fire_status_values}"]

[["defence"]]
patterns = ["{_fire_defence_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "prefix"
from = ["_prefix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
