[["melee"]]
patterns = ["{_fire_melee_values}"]

[["area"]]
patterns = ["{_fire_area_values}"]

[["ranged"]]
patterns = ["{_fire_ranged_values}"]

[["status"]]
patterns = ["{_fire_status_values}"]

[["defence"]]
patterns = ["{_fire_defence_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "prefix"
from = ["_prefix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
