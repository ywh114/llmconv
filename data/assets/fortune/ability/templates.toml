# Ability grammar templates.
#
# Complexity levels:
#   simple    — short names, 1-2 slots, basic modifiers
#   moderate  — prepositional phrases, ordinals, simple stacks
#   complex   — multi-slot phrases, superlatives, plural/past modifiers
#   insane    — maximal stacks, cascading modifiers, multiple clauses

simple = [
    "{verb:noun}",
    "{verb} {noun}",
    "{noun} {verb}",
    "{noun} {noun}",
    "{adj} {noun}",
    "{adj} {verb:noun}",
    "{prefix}{noun}",
    "{prefix}{verb:noun}",
    "{noun}{suffix}",
    "{verb:noun}{suffix}",
    "{adj_sup} {verb}",
    "{adj_sup} {noun}",
    "{verb:gerund} {noun}",
]

moderate = [
    "{noun:possessive} {verb}",
    "{noun:possessive} {verb:noun}",
    "{noun} of {verb:noun}",
    "{adj} {verb:gerund} {noun}",
    "{ordinal} {verb:noun}",
    "{verb} {roman_numeral}",
    "{noun} {verb:noun}",
    "{verb:noun} {noun}",
    "{adj_sup} {verb:noun}",
    "{prefix+}{verb:noun}",
    "{adj} {verb:noun} of {noun:plural}",
]

complex = [
    "{adj_sup} {verb:noun} of {noun:plural}",
    "{ordinal:>1,<6} {verb:noun}",
    "{verb:past} {noun}",
    "{verb:past} {verb}",
    "{noun:possessive} {verb:noun}",
    "{adj} {verb:noun} of {noun:plural}",
    "{adj_sup} {noun} {verb:noun}",
    "{prefix}{verb:noun} of {noun:plural}",
    "{verb:noun} of {noun:plural}",
    "{adj_sup} {verb:gerund} {noun}",
    "{verb} {verb:noun}",
    "{verb} {verb:gerund}",
]

insane = [
    "{adj_sup} {adj_sup} {verb:noun}",
    "{verb:gerund} {verb:gerund} {noun}",
    "{verb} of {verb:noun}",
    "{ordinal:>1,<6} {adj_sup} {verb:noun}",
    "{adj} {adj} {verb:noun} of {noun}",
    "{prefix+}{prefix+}{verb:noun}",
    "{noun:possessive} {verb:noun} of {noun:plural}",
    "{adj_sup} {adj_sup} {verb:noun} of {noun:plural}",
    "{verb:past} {noun} {noun}",
    "{adj_sup} {verb:noun} of {verb:noun}",
]
