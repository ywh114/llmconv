category = "delivery"
# Generic melee delivery ability entries.

_melee_melee_values = [
    { value = "slash", suffixible = false },
    { value = "cleave", suffixible = false },
    { value = "impale", suffixible = false, noun_form = "impalement" },
    { value = "crush", suffixible = false },
    { value = "lunge", suffixible = false },
    { value = "bisect", suffixible = false, noun_form = "bisection" },
    { value = "skewer", suffixible = false },
    { value = "tackle", suffixible = false },
    { value = "headbutt", suffixible = false },
    { value = "uppercut", suffixible = false },
]

_suffix_values = [
    { value = "strike", prefixable = true, suffixible = false },
    { value = "slash", prefixable = true, suffixible = false },
    { value = "blow", prefixable = true, suffixible = false },
]

_noun_values = [
    { value = "blade", suffixible = false },
    { value = "fist", suffixible = false },
    { value = "hammer", suffixible = false },
    { value = "axe", suffixible = false },
    { value = "spear", suffixible = false },
    { value = "club", suffixible = false },
    { value = "maul", suffixible = false },
]

_adj_values = [
    { value = "brutal", suffixible = false },
    { value = "savage", suffixible = false },
    { value = "visceral", suffixible = false },
    { value = "close-quarters", suffixible = false },
]

_melee_movement_values = []

[["melee"]]
patterns = ["{_melee_melee_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
