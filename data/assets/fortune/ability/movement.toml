_noun_values = [
    { value = "step", prefixable = false, suffixible = false },
    { value = "stride", prefixable = false, suffixible = false },
    { value = "leap", prefixable = false, suffixible = false },
    { value = "dash", prefixable = false, suffixible = false },
    { value = "charge", prefixable = false, suffixible = false },
    { value = "rush", prefixable = false, suffixible = false },
    { value = "vault", prefixable = false, suffixible = false },
    { value = "blink", prefixable = false, suffixible = false },
    { value = "slide", prefixable = false, suffixible = false },
    { value = "soar", prefixable = false, suffixible = false },
    { value = "pounce", prefixable = false, suffixible = false },
    { value = "somersault", prefixable = false, suffixible = false },
    { value = "backflip", prefixable = false, suffixible = false },
    { value = "teleport", prefixable = false, suffixible = false },
]

_adj_values = [
    { value = "swift", prefixable = false, suffixible = false },
    { value = "sudden", prefixable = false, suffixible = false },
