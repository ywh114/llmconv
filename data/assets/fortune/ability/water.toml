    { value = "tide", prefixable = true, suffixible = false },
    { value = "wave", prefixable = true, suffixible = false },
    { value = "splash", prefixable = true, suffixible = false },
]

_domain_values = [
    { value = "tsunami", suffixible = false },
    { value = "riptide", suffixible = true },
    { value = "undertow", suffixible = false },
    { value = "whirlpool", suffixible = false },
    { value = "maelstrom", suffixible = false },
    { value = "typhoon", suffixible = false },
    { value = "monsoon", suffixible = false },
    { value = "the abyss", prefixable = false, suffixible = false },
    { value = "the deep", prefixable = false, suffixible = false },
    { value = "coral", suffixible = false },
    { value = "sea cucumber", prefixable = false, suffixible = false },
]

_water_melee_values = [
    { value = "crash", suffixible = false },
    { value = "jet", suffixible = true },
]

_water_area_values = [
    { value = "tide", suffixible = true },
    { value = "wave", suffixible = true },
    { value = "storm", suffixible = true },
    { value = "deluge", suffixible = true },
    { value = "engulf", suffixible = false },
    { value = "flood", suffixible = false },
]

_water_ranged_values = [
    { value = "spout", suffixible = false },
    { value = "torrent", suffixible = true },
    { value = "jet", suffixible = true },
    { value = "spray", suffixible = true },
    { value = "siphon", suffixible = false },
]

_water_status_values = [
    { value = "drown", suffixible = false },
    { value = "submerge", suffixible = false },
    { value = "brine", suffixible = true, plural = "brine" },
    { value = "engulf", suffixible = false },
    { value = "siphon", suffixible = false },
]

_water_defence_values = [
    { value = "dam", suffixible = false },
    { value = "wave", suffixible = false },
]

_water_movement_values = [
    { value = "surge", suffixible = false },
    { value = "flow", suffixible = false },
]

other = [
]

_noun_values = [
    { value = "tide", suffixible = false },
    { value = "wave", suffixible = false },
    { value = "flood", suffixible = false },
    { value = "storm", suffixible = false },
    { value = "torrent", suffixible = false },
    { value = "brine", suffixible = false },
    { value = "coral", suffixible = false },
    { value = "pearl", suffixible = false },
    { value = "sea cucumber", prefixable = false, suffixible = false },
]

_adj_values = [
    { value = "tidal", suffixible = false },
    { value = "abyssal", suffixible = false },
    { value = "torrential", suffixible = false },
    { value = "briny", suffixible = false },
    { value = "pelagic", suffixible = false },
    { value = "drowning", suffixible = false },
    { value = "pearl", suffixible = false },
    { value = "moist", suffixible = false },
]


[["melee"]]
patterns = ["{_water_melee_values}"]

[["area"]]
patterns = ["{_water_area_values}"]

[["ranged"]]
patterns = ["{_water_ranged_values}"]

[["status"]]
patterns = ["{_water_status_values}"]

[["defence"]]
patterns = ["{_water_defence_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "prefix"
from = ["_prefix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
