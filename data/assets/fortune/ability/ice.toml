[["melee"]]
patterns = ["{_ice_melee_values}"]

[["area"]]
patterns = ["{_ice_area_values}"]

[["ranged"]]
patterns = ["{_ice_ranged_values}"]

[["status"]]
patterns = ["{_ice_status_values}"]

[["defence"]]
patterns = ["{_ice_defence_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "prefix"
from = ["_prefix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
