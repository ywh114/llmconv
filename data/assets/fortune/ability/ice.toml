category = "elemental"
# Ice-elemental ability entries.

_prefix_values = [
    { value = "cryo", suffixible = true },
    { value = "hoar", suffixible = false },
]

_suffix_values = [
    { value = "frost", prefixable = true, suffixible = false },
    { value = "chill", prefixable = true, suffixible = false },
    { value = "freeze", prefixable = true, suffixible = false },
    { value = "rime", prefixable = true, suffixible = false },
]

_domain_values = [
    { value = "tundra", suffixible = false },
    { value = "mountain", suffixible = false },
    { value = "permafrost", suffixible = false, plural = "permafrost" },
    { value = "blizzard", suffixible = false },
    { value = "glacier", suffixible = false },
    { value = "avalanche", suffixible = false },
    { value = "hoarfrost", suffixible = false, plural = "hoarfrost" },
    { value = "frost", suffixible = false, plural = "frost" },
    { value = "shiver", suffixible = true },
    { value = "hail", suffixible = true, plural = "hail" },
    { value = "whiteout", suffixible = false },
]

_ice_melee_values = [
    { value = "shatter", suffixible = false },
    { value = "spear", suffixible = false },
    { value = "fracture", suffixible = false },
    { value = "shear", suffixible = false },
]

_ice_area_values = [
    { value = "storm", suffixible = false },
    { value = "avalanche", suffixible = false },
    { value = "blizzard", suffixible = false },
]

_ice_ranged_values = [
    { value = "shard", suffixible = false },
    { value = "icicle", suffixible = false },
    { value = "spear", suffixible = false },
]

_ice_status_values = [
    { value = "freeze", suffixible = false },
    { value = "preserve", suffixible = false, noun_form = "preservation" },
    { value = "encase", suffixible = false, noun_form = "encasement" },
]

_ice_defence_values = [
    { value = "hibernate", suffixible = false, noun_form = "hibernation" },
    { value = "still", suffixible = false, noun_form = "stillness" },
]

_ice_movement_values = [
    { value = "creep", suffixible = false, noun_form = "stillness" },
]

other = [
]

_noun_values = [
    { value = "rime", suffixible = false, plural = "rime" },
    { value = "ice", suffixible = false, plural = "ice" },
    { value = "snow", suffixible = false, plural = "ice" },
    { value = "glacier", suffixible = false },
    { value = "blizzard", suffixible = false },
    { value = "permafrost", suffixible = false },
    { value = "whiteout", suffixible = false },
]

_adj_values = [
    { value = "biting", suffixible = false },
    { value = "howling", suffixible = false },
    { value = "bitter", suffixible = false },
    { value = "frozen", suffixible = false },
    { value = "icy", suffixible = false },
    { value = "bleak", suffixible = false },
    { value = "white", suffixible = false },
]


[["melee"]]
patterns = ["{_ice_melee_values}"]

[["area"]]
patterns = ["{_ice_area_values}"]

[["ranged"]]
patterns = ["{_ice_ranged_values}"]

[["status"]]
patterns = ["{_ice_status_values}"]

[["defence"]]
patterns = ["{_ice_defence_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "prefix"
from = ["_prefix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
