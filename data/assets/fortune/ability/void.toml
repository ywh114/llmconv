]

_suffix_values = [
    { value = "", prefixable = true, suffixible = false },
    { value = "void", prefixable = true, suffixible = false },
    { value = "null", prefixable = true, suffixible = false },
    { value = "dark", prefixable = true, suffixible = false },
]

_domain_values = [
    { value = "oblivion", prefixable = false, suffixible = false },
    { value = "vacuum", prefixable = false, suffixible = false },
    { value = "the abyss", prefixable = false, suffixible = false },
    { value = "nothing", prefixable = false, suffixible = false },
    { value = "the hollow", prefixable = false, suffixible = false },
    { value = "the void", prefixable = false, suffixible = false },
]

_void_melee_values = [
    { value = "annihilation", prefixable = false, suffixible = false },
    { value = "erasure", prefixable = false, suffixible = false },
]

_void_area_values = [
    { value = "collapse", prefixable = false, suffixible = false },
    { value = "annihilation", prefixable = false, suffixible = false },
]

_void_ranged_values = [
    { value = "siphon", prefixable = false, suffixible = false },
    { value = "unmake", prefixable = false, suffixible = false, pos = "verb" },
]

_void_status_values = [
    { value = "siphon", prefixable = false, suffixible = false },
    { value = "erasure", prefixable = false, suffixible = false },
    { value = "unmake", prefixable = false, suffixible = false, pos = "verb" },
]

_void_defence_values = [
    { value = "negate", prefixable = false, suffixible = false, noun_form = "negation" },
    { value = "nullify", prefixable = false, suffixible = false, noun_form = "nullification" },
    { value = "deny", prefixable = false, suffixible = false, noun_form = "denial" },
]

_void_movement_values = [
]

other = [
    { value = "annihilation", prefixable = false, suffixible = false },
    { value = "erase", prefixable = false, suffixible = false, noun_form = "erasure" },
    { value = "unmake", prefixable = false, suffixible = false },
    { value = "consume", prefixable = false, suffixible = false, noun_form = "consumption" },
    { value = "negation", prefixable = false, suffixible = false },
]

_noun_values = [
    { value = "void", prefixable = false, suffixible = false },
    { value = "abyss", prefixable = false, suffixible = false },
    { value = "oblivion", prefixable = false, suffixible = false },
    { value = "noth", prefixable = false, suffixible = false, pos = "verb" },
]

_adj_values = [
    { value = "empty", prefixable = false, suffixible = false },
    { value = "hollow", prefixable = false, suffixible = false },
    { value = "crush", prefixable = false, suffixible = false, pos = "verb" },
    { value = "absolute", prefixable = false, suffixible = false },
]


[["melee"]]
patterns = ["{_void_melee_values}"]

[["area"]]
patterns = ["{_void_area_values}"]

[["ranged"]]
patterns = ["{_void_ranged_values}"]

[["status"]]
patterns = ["{_void_status_values}"]

[["defence"]]
patterns = ["{_void_defence_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "prefix"
from = ["_prefix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
