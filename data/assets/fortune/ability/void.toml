[["melee"]]
patterns = ["{void_melee_values}"]

[["area"]]
patterns = ["{void_area_values}"]

[["ranged"]]
patterns = ["{void_ranged_values}"]

[["status"]]
patterns = ["{void_status_values}"]

[["defence"]]
patterns = ["{void_defence_values}"]

[[expose]]
slot = "suf"
from = ["suf_values"]

[[expose]]
slot = "prefix"
from = ["prefix_values"]

[[expose]]
slot = "domain"
from = ["domain_values"]

[[expose]]
slot = "technique"
from = ["melee", "area", "ranged", "status", "defence", "movement"]

[[expose]]
slot = "verb"
from = ["verb_values"]

[[expose]]
slot = "noun"
from = ["noun_values"]

[[expose]]
slot = "adj"
from = ["adj_values"]
