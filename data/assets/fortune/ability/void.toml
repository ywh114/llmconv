]

void_area_values = [
    { value = "collapse", prefixable = false, suffixible = false },
    { value = "annihilation", prefixable = false, suffixible = false },
]

void_ranged_values = [
    { value = "siphon", prefixable = false, suffixible = false },
    { value = "unmaking", prefixable = false, suffixible = false },
]

void_status_values = [
    { value = "siphon", prefixable = false, suffixible = false },
    { value = "erasure", prefixable = false, suffixible = false },
    { value = "unmaking", prefixable = false, suffixible = false },
]

void_defence_values = [
    { value = "negate", prefixable = false, suffixible = false },
    { value = "nullify", prefixable = false, suffixible = false },
    { value = "deny", prefixable = false, suffixible = false },
]

void_movement_values = [
]

verb_values = [
    { value = "annihilation", prefixable = false, suffixible = false },
    { value = "erase", prefixable = false, suffixible = false },
    { value = "unmake", prefixable = false, suffixible = false },
    { value = "consume", prefixable = false, suffixible = false },
    { value = "negation", prefixable = false, suffixible = false },
]

noun_values = [
    { value = "void", prefixable = false, suffixible = false },
    { value = "abyss", prefixable = false, suffixible = false },
