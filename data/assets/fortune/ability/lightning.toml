other = [
]

_noun_values = [
    { value = "storm", suffixible = false },
    { value = "bolt", suffixible = false },
    { value = "thunder", suffixible = false },
    { value = "plasma", suffixible = false },
]

_adj_values = [
    { value = "crackling", suffixible = false },
    { value = "thundering", suffixible = false },
    { value = "arcing", suffixible = false },
    { value = "ionized", suffixible = false },
]

[["melee"]]
patterns = ["{_lightning_melee_values}"]

[["area"]]
patterns = ["{_lightning_area_values}"]

[["ranged"]]
patterns = ["{_lightning_ranged_values}"]

[["defence"]]
patterns = ["{_lightning_defence_values}"]

[["status"]]
patterns = ["{_lightning_status_values}"]

[["movement"]]
patterns = ["{_lightning_movement_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "prefix"
from = ["_prefix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
