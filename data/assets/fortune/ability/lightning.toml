category = "elemental"
# Lightning-elemental ability entries.

_prefix_values = [
    { value = "electro", suffixible = true },
    { value = "volt", suffixible = true },
]

_suffix_values = [
    { value = "", prefixable = true, suffixible = false },
    { value = "shock", prefixable = true, suffixible = false },
    { value = "jolt", prefixable = true, suffixible = false },
    { value = "spark", prefixable = true, suffixible = false },
    { value = "bolt", prefixable = true, suffixible = false },
]

_domain_values = [
    { value = "tempest", suffixible = false },
    { value = "discharge", suffixible = false },
    { value = "thunder", suffixible = false },
    { value = "lightning", suffixible = false },
    { value = "current", suffixible = false },
    { value = "plasma", suffixible = false },
]

_lightning_melee_values = [
    { value = "jolt", suffixible = false },
    { value = "shock", suffixible = false },
    { value = "fry", suffixible = false },
]

_lightning_area_values = [
    { value = "discharge", suffixible = false },
    { value = "overload", suffixible = false },
    { value = "tempest", suffixible = false },
]

_lightning_ranged_values = [
    { value = "arc", suffixible = false },
    { value = "bolt", suffixible = true },
    { value = "spark", suffixible = true },
    { value = "discharge", suffixible = false },
    { value = "overload", suffixible = false },
]

_lightning_defence_values = [
    { value = "ground", suffixible = false },
    { value = "repel", suffixible = false, noun_form = "repulsion" },
]

_lightning_status_values = [
    { value = "charge", suffixible = false },
    { value = "overload", suffixible = false },
    { value = "electrification", suffixible = false },
