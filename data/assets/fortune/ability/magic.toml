[[technique]]
patterns = [
    "{_spell_root}{_spell_form}",
    "{_spell_root}",
    "{prefix}{_spell_root}",
]

[["melee"]]
patterns = ["{_magic_melee_values}"]

[["area"]]
patterns = ["{_magic_area_values}"]

[["ranged"]]
patterns = ["{_magic_ranged_values}"]

[["status"]]
patterns = ["{_magic_status_values}"]

[["defence"]]
patterns = ["{_magic_defence_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "prefix"
from = ["_prefix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
