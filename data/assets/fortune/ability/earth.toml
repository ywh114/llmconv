[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "prefix"
from = ["_prefix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
