category = "delivery"
# Generic ranged delivery ability entries.

_ranged_ranged_values = [
    { value = "shot", suffixible = false },
    { value = "volley", suffixible = false },
    { value = "barrage", suffixible = false },
    { value = "beam", suffixible = false },
    { value = "bolt", suffixible = false },
    { value = "salvo", suffixible = false },
    { value = "snipe", suffixible = false },
    { value = "spray", suffixible = false },
    { value = "payload", suffixible = false },
]

_suffix_values = [
    { value = "shot", prefixable = true, suffixible = false },
    { value = "bolt", prefixable = true, suffixible = false },
    { value = "volley", prefixable = true, suffixible = false },
]

_noun_values = [
    { value = "arrow", suffixible = false },
    { value = "bullet", suffixible = false },
    { value = "shell", suffixible = false },
    { value = "missile", suffixible = false },
    { value = "projectile", suffixible = false },
    { value = "lead", suffixible = false },
]

_adj_values = [
    { value = "long-range", suffixible = false },
    { value = "precision", suffixible = false },
    { value = "suppressing", suffixible = false },
    { value = "homing", suffixible = false },
]

_ranged_movement_values = []

[["ranged"]]
patterns = ["{_ranged_ranged_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
