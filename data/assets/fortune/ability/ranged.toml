    { value = "volley", prefixable = false, suffixible = false },
    { value = "barrage", prefixable = false, suffixible = false },
    { value = "beam", prefixable = false, suffixible = false },
    { value = "bolt", prefixable = false, suffixible = false },
    { value = "salvo", prefixable = false, suffixible = false },
    { value = "snipe", prefixable = false, suffixible = false },
    { value = "spray", prefixable = false, suffixible = false },
    { value = "payload", prefixable = false, suffixible = false },
]

_suffix_values = [
    { value = "shot", prefixable = true, suffixible = false },
    { value = "bolt", prefixable = true, suffixible = false },
    { value = "volley", prefixable = true, suffixible = false },
]

_noun_values = [
    { value = "arrow", prefixable = false, suffixible = false },
    { value = "bullet", prefixable = false, suffixible = false },
    { value = "shell", prefixable = false, suffixible = false },
    { value = "missile", prefixable = false, suffixible = false },
    { value = "projectile", prefixable = false, suffixible = false },
    { value = "lead", prefixable = false, suffixible = false },
]

_adj_values = [
    { value = "long-range", prefixable = false, suffixible = false },
    { value = "precision", prefixable = false, suffixible = false },
    { value = "suppressing", prefixable = false, suffixible = false },
    { value = "homing", prefixable = false, suffixible = false },
]

_ranged_movement_values = []

[["ranged"]]
patterns = ["{_ranged_ranged_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
