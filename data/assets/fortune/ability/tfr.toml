[[expose]]
slot = "suf"
from = ["suf_values"]

[[expose]]
slot = "technique"
from = ["melee", "area", "status", "defence", "movement"]

[[expose]]
slot = "verb"
from = ["verb_values"]

[[expose]]
slot = "domain"
from = ["domain_values"]

[[expose]]
slot = "noun"
from = ["noun_values"]

[[expose]]
slot = "adj"
from = ["adj_values"]
