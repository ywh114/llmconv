category = "delivery"
# Generic area-of-effect delivery ability entries.

_area_area_values = [
    { value = "storm", suffixible = false },
    { value = "pulse", suffixible = false },
    { value = "nova", suffixible = false },
    { value = "wave", suffixible = false },
    { value = "burst", suffixible = false },
    { value = "field", suffixible = false },
    { value = "blast", suffixible = false },
    { value = "zone", suffixible = false },
    { value = "aura", suffixible = false },
    { value = "cascade", suffixible = false },
]

_suffix_values = [
    { value = "storm", prefixable = true, suffixible = false },
    { value = "wave", prefixable = true, suffixible = false },
    { value = "burst", prefixable = true, suffixible = false },
    { value = "blast", prefixable = true, suffixible = false },
    { value = "field", prefixable = true, suffixible = false },
]

_noun_values = [
    { value = "blast", suffixible = false },
    { value = "radius", suffixible = false, plural = "radii" },
    { value = "splash", suffixible = false },
    { value = "shockwave", suffixible = false },
    { value = "fallout", suffixible = false },
]

_adj_values = [
    { value = "wide-area", suffixible = false },
    { value = "carpet", suffixible = false },
    { value = "saturation", suffixible = false },
    { value = "indiscriminate", suffixible = false },
]

_area_movement_values = []

[["area"]]
patterns = ["{_area_area_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
