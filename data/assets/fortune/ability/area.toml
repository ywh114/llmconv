category = "delivery"
# Generic area-of-effect delivery ability entries.

_area_area_values = [
    { value = "storm", prefixable = false, suffixible = false },
    { value = "pulse", prefixable = false, suffixible = false },
    { value = "nova", prefixable = false, suffixible = false },
    { value = "wave", prefixable = false, suffixible = false },
    { value = "burst", prefixable = false, suffixible = false },
    { value = "field", prefixable = false, suffixible = false },
    { value = "blast", prefixable = false, suffixible = false },
    { value = "zone", prefixable = false, suffixible = false },
    { value = "aura", prefixable = false, suffixible = false },
    { value = "cascade", prefixable = false, suffixible = false },
]

_suffix_values = [
    { value = "storm", prefixable = true, suffixible = false },
    { value = "wave", prefixable = true, suffixible = false },
    { value = "burst", prefixable = true, suffixible = false },
    { value = "blast", prefixable = true, suffixible = false },
    { value = "field", prefixable = true, suffixible = false },
]

_noun_values = [
    { value = "blast", prefixable = false, suffixible = false },
    { value = "radius", prefixable = false, suffixible = false, plural = "radii" },
    { value = "splash", prefixable = false, suffixible = false },
    { value = "shockwave", prefixable = false, suffixible = false },
    { value = "fallout", prefixable = false, suffixible = false },
]

_adj_values = [
    { value = "wide-area", prefixable = false, suffixible = false },
    { value = "carpet", prefixable = false, suffixible = false },
    { value = "saturation", prefixable = false, suffixible = false },
    { value = "indiscriminate", prefixable = false, suffixible = false },
]

_area_movement_values = []

[["area"]]
patterns = ["{_area_area_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
