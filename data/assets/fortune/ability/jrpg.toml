    { value = "rend", suffixible = false },
    { value = "combo", suffixible = false },
    { value = "bash", suffixible = false },
    { value = "slash", suffixible = false },
    { value = "claw", suffixible = false },
]

_jrpg_area_values = [
    { value = "meteor", suffixible = false },
    { value = "quake", suffixible = false },
    { value = "storm", suffixible = false },
    { value = "rain", suffixible = false },
]

_jrpg_ranged_values = [
    { value = "ball", suffixible = false },
    { value = "beam", suffixible = false },
    { value = "pulse", suffixible = false },
    { value = "comet", suffixible = false },
]

_jrpg_status_values = [
    { value = "haste", suffixible = false },
    { value = "slow", suffixible = false },
    { value = "DPS effect", prefixable = false, suffixible = false },
    { value = "stun", suffixible = false },
    { value = "berserk", suffixible = false },
    { value = "taunt", suffixible = false },
    { value = "regen", suffixible = false },
    { value = "revive", suffixible = false, noun_form = "revival" },
    { value = "full cure", prefixable = false, suffixible = false },
    { value = "doublecast", suffixible = false },
    { value = "triplecast", suffixible = false },
    { value = "drain", suffixible = false },
    { value = "armor break", prefixable = false, suffixible = false },
    { value = "poison", suffixible = false },
    { value = "paralysis", suffixible = false },
    { value = "limit break", prefixable = false, suffixible = false },
    { value = "curse", suffixible = false },
]

_jrpg_defence_values = [
    { value = "resist", suffixible = false, noun_form = "resistance" },
    { value = "reflect", suffixible = false, noun_form = "reflection" },
]

_jrpg_movement_values = [
    { value = "dash", suffixible = false },
    { value = "warp", suffixible = false },
]

_suffix_values = [
    { value = "edge", prefixable = true, suffixible = false },
    { value = "slash", prefixable = true, suffixible = false },
    { value = "strike", prefixable = true, suffixible = false },
    { value = "blade", prefixable = true, suffixible = false },
]

_domain_values = [
    { value = "summon", suffixible = false },
    { value = "ether", suffixible = false },
    { value = "elixir", suffixible = false },
    { value = "MP", suffixible = false },
    { value = "HP", suffixible = false },
    { value = "EXP", suffixible = false },
]

other = [
    { value = "level up", prefixable = false, suffixible = false },
    { value = "minmax", suffixible = false },
    { value = "speedrun", suffixible = false },
    { value = "multiclass", suffixible = false },
    { value = "respec", suffixible = false },
    { value = "save scum", prefixable = false, suffixible = false },
]

_noun_values = [
    { value = "guild", suffixible = false },
    { value = "class", suffixible = false },
    { value = "skill point", prefixable = false, suffixible = false },
    { value = "crystal", suffixible = false },
    { value = "orb", suffixible = false },
    { value = "potion", suffixible = false },
]

[["melee"]]
patterns = ["{_jrpg_melee_values}"]

[["area"]]
patterns = ["{_jrpg_area_values}"]

[["ranged"]]
patterns = ["{_jrpg_ranged_values}"]

[["status"]]
patterns = ["{_jrpg_status_values}"]

[["defence"]]
patterns = ["{_jrpg_defence_values}"]

[["movement"]]
patterns = ["{_jrpg_movement_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
