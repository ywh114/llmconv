[["melee"]]
patterns = ["{_body_part_melee_values}"]

[["area"]]
patterns = ["{_body_part_area_values}"]

[["ranged"]]
patterns = ["{_body_part_ranged_values}"]

[["status"]]
patterns = ["{_body_part_status_values}"]

[["defence"]]
patterns = ["{_body_part_defence_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
