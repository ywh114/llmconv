    { value = "chrono", prefixable = false, suffixible = true },
    { value = "tempo", prefixable = false, suffixible = true },
    { value = "aeon", prefixable = false, suffixible = true },
]

time_status_values = [
    { value = "haste", prefixable = false, suffixible = false },
    { value = "slow", prefixable = false, suffixible = false },
    { value = "stop", prefixable = false, suffixible = false },
    { value = "freeze", prefixable = false, suffixible = false },
    { value = "lag", prefixable = false, suffixible = false },
    { value = "accelerate", prefixable = false, suffixible = false },
    { value = "decelerate", prefixable = false, suffixible = false },
    { value = "delay", prefixable = false, suffixible = false },
    { value = "loop", prefixable = false, suffixible = false },
]

time_area_values = [
    { value = "loop", prefixable = false, suffixible = false },
