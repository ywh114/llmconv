]

_adj_values = [
    { value = "fortifying", suffixible = false },
    { value = "empowering", suffixible = false },
    { value = "blessed", suffixible = false },
    { value = "cursed", suffixible = false },
    { value = "hexed", suffixible = false },
    { value = "sapping", suffixible = false },
    { value = "draining", suffixible = false },
]

_status_movement_values = []

[["status"]]
patterns = ["{_status_status_values}"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]

[[expose]]
slot = "adj"
from = ["_adj_values"]

[[expose]]
slot = "verb"
from = [
    "melee",
    "area",
    "ranged",
    "status",
    "defence",
    "movement",
    "other",
]

[[expose]]
slot = "noun"
from = [
    "_domain_values",
    "_noun_values",
]
