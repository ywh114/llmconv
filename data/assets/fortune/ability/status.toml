    { value = "sap", suffixible = false },
    { value = "drain", suffixible = false },
    { value = "curse", suffixible = false },
    { value = "cripple", suffixible = false },
]

_suffix_values = [
    { value = "ward", prefixable = true, suffixible = false },
    { value = "bane", prefixable = true, suffixible = false },
    { value = "hex", prefixable = true, suffixible = false },
]

_noun_values = [
    { value = "blessing", suffixible = false },
    { value = "aura", suffixible = false },
    { value = "chant", suffixible = false },
    { value = "mantra", suffixible = false },
