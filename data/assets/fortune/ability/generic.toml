# Generic/fallback ability entries (prefixes and suffixes only).

_prefix_values = [
    { value = "hyper", suffixible = true },
    { value = "mega", suffixible = true },
    { value = "ultra", suffixible = true },
    { value = "proto", suffixible = true },
    { value = "neo", suffixible = true },
    { value = "quasi", suffixible = true },
    { value = "para", suffixible = true },
    { value = "meta", suffixible = true },
    { value = "micro", suffixible = true },
    { value = "nano", suffixible = true },
]

_suffix_values = [
    { value = "thermia", prefixable = true, suffixible = false },
    { value = "kinesis", prefixable = true, suffixible = false },
    { value = "mancy", prefixable = true, suffixible = false },
    { value = "genesis", prefixable = true, suffixible = false },
    { value = "phagia", prefixable = true, suffixible = false },
    { value = "morph", prefixable = true, suffixible = false },
    { value = "pathy", prefixable = true, suffixible = false },
    { value = "lysis", prefixable = true, suffixible = false },
    { value = "ology", prefixable = true, suffixible = false },
    { value = "trophy", prefixable = true, suffixible = false },
    { value = "stasis", prefixable = true, suffixible = false },
    { value = "+", prefixable = true, suffixible = false },
]

[[expose]]
slot = "prefix"
from = ["_prefix_values"]

[[expose]]
slot = "suffix"
from = ["_suffix_values"]


[["prefix+"]]
patterns = [
    "{prefix}",
    "{prefix}{prefix}",
    "{prefix}{prefix}{prefix}",
]
