roman_numeral = [
    { value = "I" },
    { value = "II" },
    { value = "III" },
    { value = "IV" },
    { value = "V" },
    { value = "VI" },
    { value = "VII" },
    { value = "VIII" },
    { value = "IX" },
    { value = "X" },
    { value = "XI" },
    { value = "XII" },
    { value = "L" },
    { value = "C" },
    { value = "D" },
    { value = "M" },
]
digit = [
    { value = "0" },
    { value = "1" },
    { value = "2" },
    { value = "3" },
    { value = "4" },
    { value = "5" },
    { value = "6" },
    { value = "7" },
    { value = "8" },
    { value = "9" },
]
_nonzero_digit = [
    { value = "1" },
    { value = "2" },
    { value = "3" },
    { value = "4" },
    { value = "5" },
    { value = "6" },
    { value = "7" },
    { value = "8" },
    { value = "9" },
]
_ordinal_root = [
    { value = "0th" },
    { value = "1st" },
    { value = "2nd" },
    { value = "3rd" },
    { value = "4th" },
    { value = "5th" },
    { value = "6th" },
    { value = "7th" },
    { value = "8th" },
    { value = "9th" },
]

[[ordinal]]
patterns = [
  "{_ordinal_root}",
  "{_nonzero_number}{_ordinal_root}"
]

[[digit_ordinal]]
patterns = [
  "{_ordinal_root}",
]

[[number]]
patterns = [
    "{digit}",
    "{_nonzero_digit}{digit}",
    "{_nonzero_digit}{digit}{digit}",
    "{_nonzero_digit}{digit}{digit}{digit}",
    "{_nonzero_digit}{digit}{digit}{digit}{digit}",
]

[[_nonzero_number]]
patterns = [
    "{digit}",
    "{_nonzero_digit}{digit}",
    "{_nonzero_digit}{digit}{digit}",
    "{_nonzero_digit}{digit}{digit}{digit}",
    "{_nonzero_digit}{digit}{digit}{digit}{digit}",
]

[[expose]]
slot = "number"
from = [
    "number",
    "digit",
]

[[expose]]
slot = "ordinal"
from = [
    "digit_ordinal",
    "ordinal",
]

[[expose]]
slot = "roman_numeral"
from = [
    "roman_numeral",
]
