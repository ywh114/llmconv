roman_numeral = [
    { value = "I", prefixable = true, suffixible = true },
    { value = "II", prefixable = true, suffixible = true },
    { value = "III", prefixable = true, suffixible = true },
    { value = "IV", prefixable = true, suffixible = true },
    { value = "V", prefixable = true, suffixible = true },
    { value = "VI", prefixable = true, suffixible = true },
    { value = "VII", prefixable = true, suffixible = true },
    { value = "VIII", prefixable = true, suffixible = true },
    { value = "IX", prefixable = true, suffixible = true },
    { value = "X", prefixable = true, suffixible = true },
    { value = "XI", prefixable = true, suffixible = true },
    { value = "XII", prefixable = true, suffixible = true },
    { value = "L", prefixable = true, suffixible = true },
    { value = "C", prefixable = true, suffixible = true },
    { value = "D", prefixable = true, suffixible = true },
    { value = "M", prefixable = true, suffixible = true },
]
digit = [
    { value = "0", prefixable = true, suffixible = true },
    { value = "1", prefixable = true, suffixible = true },
    { value = "2", prefixable = true, suffixible = true },
    { value = "3", prefixable = true, suffixible = true },
    { value = "4", prefixable = true, suffixible = true },
    { value = "5", prefixable = true, suffixible = true },
    { value = "6", prefixable = true, suffixible = true },
    { value = "7", prefixable = true, suffixible = true },
    { value = "8", prefixable = true, suffixible = true },
    { value = "9", prefixable = true, suffixible = true },
]
_nonzero_digit = [
    { value = "1", prefixable = true, suffixible = true },
    { value = "2", prefixable = true, suffixible = true },
    { value = "3", prefixable = true, suffixible = true },
    { value = "4", prefixable = true, suffixible = true },
    { value = "5", prefixable = true, suffixible = true },
    { value = "6", prefixable = true, suffixible = true },
    { value = "7", prefixable = true, suffixible = true },
    { value = "8", prefixable = true, suffixible = true },
    { value = "9", prefixable = true, suffixible = true },
]
_ordinal_root = [
    { value = "0th", prefixable = true, suffixible = true },
    { value = "1st", prefixable = true, suffixible = true },
    { value = "2nd", prefixable = true, suffixible = true },
    { value = "3rd", prefixable = true, suffixible = true },
    { value = "4th", prefixable = true, suffixible = true },
    { value = "5th", prefixable = true, suffixible = true },
    { value = "6th", prefixable = true, suffixible = true },
    { value = "7th", prefixable = true, suffixible = true },
    { value = "8th", prefixable = true, suffixible = true },
    { value = "9th", prefixable = true, suffixible = true },
]

[[ordinal]]
patterns = [
  "{_ordinal_root}",
  "{_nonzero_number}{_ordinal_root}"
]

[[number]]
patterns = [
    "{digit}",
    "{_nonzero_digit}{digit}",
    "{_nonzero_digit}{digit}{digit}",
    "{_nonzero_digit}{digit}{digit}{digit}",
    "{_nonzero_digit}{digit}{digit}{digit}{digit}",
]

[[_nonzero_number]]
patterns = [
    "{digit}",
    "{_nonzero_digit}{digit}",
    "{_nonzero_digit}{digit}{digit}",
    "{_nonzero_digit}{digit}{digit}{digit}",
    "{_nonzero_digit}{digit}{digit}{digit}{digit}",
]

[[expose]]
slot = "number"
from = [
    "number",
    "digit",
]

[[expose]]
slot = "ordinal"
from = [
    "ordinal",
]

[[expose]]
slot = "roman_numeral"
from = [
    "roman_numeral",
]
