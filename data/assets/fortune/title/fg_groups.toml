_group_root = [
    { value = "group" },
    { value = "ring" },
    { value = "field" },
    { value = "module" },
    { value = "lattice" },
]
_group_name = [
    { value = "Z" },
    { value = "Z/{number}Z" },
    { value = "S({number})" },
    { value = "D({number})" },
    { value = "A({number})" },
    { value = "GL({number})" },
    { value = "SL({number})" },
    { value = "O({number})" },
    { value = "SO({number})" },
]
adj = [
    { value = "finitely generated", prefixable = false, suffixible = false },
    { value = "infinite" },
    { value = "torsion" },
    { value = "cyclic" },
    { value = "free" },
    { value = "abelian" },
    { value = "nilpotent" },
    { value = "solvable" },
]
adj_sup = [
    { value = "universal" },
]
rank = [
    { value = "generator" },
    { value = "basis" },
    { value = "closure" },
    { value = "relation" },
]
suffix = [
    { value = "oid" },
    { value = "ary" },
]
noun = [
    { value = "symmetries" },
    { value = "automorphisms" },
    { value = "cosets" },
]

[[group]]
patterns = [
    "{_group_root}",
    "{_group_name}",
]

[[expose]]
slot = "noun"
from = [
    "group",
]

[[expose]]
slot = "adj"
from = [
    "adj",
]

[[expose]]
slot = "adj_sup"
from = [
    "adj_sup",
]

[[expose]]
slot = "rank"
from = [
    "rank",
]

[[expose]]
slot = "suffix"
from = [
    "suffix",
]
