group_root = [
    { value = "group", prefixable = true, suffixible = true },
    { value = "ring", prefixable = true, suffixible = true },
    { value = "field", prefixable = true, suffixible = true },
    { value = "module", prefixable = true, suffixible = true },
    { value = "lattice", prefixable = true, suffixible = true },
]
group_name = [
    { value = "Z", prefixable = true, suffixible = true },
    { value = "Z/{number}Z", prefixable = true, suffixible = true },
    { value = "S({number})", prefixable = true, suffixible = true },
    { value = "D({number})", prefixable = true, suffixible = true },
    { value = "A({number})", prefixable = true, suffixible = true },
    { value = "GL({number})", prefixable = true, suffixible = true },
    { value = "SL({number})", prefixable = true, suffixible = true },
    { value = "O({number})", prefixable = true, suffixible = true },
    { value = "SO({number})", prefixable = true, suffixible = true },
]
adj = [
    { value = "finitely generated", prefixable = false, suffixible = false },
    { value = "infinite", prefixable = true, suffixible = true },
    { value = "torsion", prefixable = true, suffixible = true },
    { value = "cyclic", prefixable = true, suffixible = true },
    { value = "free", prefixable = true, suffixible = true },
    { value = "abelian", prefixable = true, suffixible = true },
    { value = "nilpotent", prefixable = true, suffixible = true },
    { value = "solvable", prefixable = true, suffixible = true },
]
adj_sup = [
    { value = "universal", prefixable = true, suffixible = true },
]
rank = [
    { value = "generator", prefixable = true, suffixible = true },
    { value = "relation", prefixable = true, suffixible = true },
]
thing = [
    { value = "symmetries", prefixable = true, suffixible = true },
    { value = "automorphisms", prefixable = true, suffixible = true },
    { value = "cosets", prefixable = true, suffixible = true },
]

suf = [
    { value = 'ring', prefixable = true, suffixible = true },
    { value = 'field', prefixable = true, suffixible = true },
    { value = 'group', prefixable = true, suffixible = true },
    { value = 'kind', prefixable = true, suffixible = true },
]

[[group]]
patterns = [
    "{group_root}",
    "{group_name}",
]

[[expose]]
slot = "noun"
from = [
    "group",
]

[[expose]]
slot = "adj"
from = [
    "adj",
]

[[expose]]
slot = "adj_sup"
from = [
    "adj_sup",
]

[[expose]]
slot = "rank"
from = [
    "rank",
]

[[expose]]
slot = "thing"
from = [
    "thing",
]
[[expose]]
slot = "suf"
from = [
    "suf",
]
