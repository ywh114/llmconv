# Generic high-level title templates.
#
# The core indirection is the ``subject`` slot defined in ``generic.toml``.
# A subject can be any interchangeable head: a rank, class, noun, class,
# thing, or a compound of those (prefixed, adjectival, hyphenated, etc.).
#
# Templates combine subjects with raw slots (place, thing, ordinal, number)
# and other indirections as needed.
#
# Complexity levels:
#   simple    — short, readable, one or two slots
#   moderate  — a few more moving parts, compounds, ordinals
#   complex   — longer phrases, multiple clauses, prefix stacks
#   insane    — maximalist cross-flavor soup

simple = [
    # Bare subject
    "{subject}",
    "The {subject}",

    # Direct rank / class (also reachable via {subject})
    "{rank}",
    "{class}",
    "The {rank}",
    "The {class}",

    # Subject + prepositional phrase
    "{subject} of {place}",
    "{subject} of {thing}",
    "{subject} in {place}",
    "{subject} from {place}",
    "{subject} over {place}",
    "{subject} upon {place}",
    "{subject} near {place}",
    "{subject} under {place}",
    "{subject} within {place}",

    # Direct rank/class + prepositional phrase
    "{rank} of {place}",
    "{rank} of {thing}",
    "{class} of {place}",
    "{class} of {thing}",

    # Descriptors
    "The {adj}",
    "The {adj_sup}",

    # Modified subject
    "{adj} {subject}",
    "{adj_sup} {subject}",

    # Modified rank/class
    "{adj} {rank}",
    "{adj} {class}",

    # Attributive place in front
    "{place} {subject}",

    # Number/ordinal after subject
    "{subject} {ordinal}",
    "{subject} {roman_numeral}",
    "{subject} {number}",
    "{subject}-{number}",

    # Number/ordinal before subject
    "{ordinal} {subject}",
    "{roman_numeral} {subject}",

    # Suffix compounds (short, natural)
    "{noun}{suf}",
    "{thing}{suf}",
    "{place}{suf}",
    "{rank}{suf}",
    "{class}{suf}",
]

moderate = [
    # Coordination
    "{subject} of {place} and {place}",
    "{subject} of {place} and {subject}",
    "{subject} and {subject}",
    "{subject} or {subject}",
    "{subject} yet {subject}",
    "{rank} and {rank}",
    "{rank} of {place} and {place}",

    # More descriptors
    "{adj} and {adj}",
    "{adj_sup} and {adj_sup}",
    "{adj} and {adj_sup}",
    "{adj_sup} and {adj}",

    # Prefix stacks on the subject
    "{prefix+} {subject}",
    "{prefix+}{subject}",
    "{prefix+} {rank}",
    "{prefix+} {class}",

    # Modified subject + prepositional phrase
    "{adj} {subject} of {place}",
    "{adj} {subject} of {thing}",
    "{adj_sup} {subject} of {place}",
    "{adj_sup} {subject} of {thing}",
    "{adj} {rank} of {place}",
    "{adj} {class} of {place}",

    # Prepositional phrases
    "{subject} before {thing}",
    "{subject} from {place}",
    "{subject} over {place}",
    "{subject} upon {place}",
    "{subject} near {place}",
    "{subject} under {place}",
    "{subject} within {place}",
    "{subject} without {place}",
    "{rank} against {place}",

    # Double adjective
    "{adj} {adj} {subject}",

    # Place attribution with adjective
    "{adj} {place} {subject}",

    # Suffix compounds
    "{adj} {adj}{suf}",
    "{adj_sup} {adj}{suf}",
    "{adj}{suf} of {place} and {place}",
    "{adj}{suf} of {thing}, {adj_sup}",
    "{prefix+}{adj}{suf}",
    "{prefix+}{noun}{suf}",
    "{rank}{suf} of {place}",
    "{class}{suf}",
]

complex = [
    # Multi-clause coordination
    "{subject} of {place} and {subject} of {place}",
    "{subject} of {thing} and {subject} of {thing}",

    # Heavy modification
    "{adj} {adj} {subject} of {place}",
    "{adj} {adj} {subject} of {thing}",
    "{prefix+} {adj} {subject}",

    # Prefix stack + subject + prepositional phrase
    "{prefix+}{subject} of {place}",
    "{prefix+}{subject} of {thing}",

    # Appositive-style
    "{subject}, {adj_sup}",
    "{subject}, {adj} {subject}",
    "{subject}, yet {adj_sup}",

    # Locative/attributive place before subject
    "{place} {subject}",
    "{adj} {place} {subject}",

    # Prepositional phrases
    "{subject} against {place}",
    "{subject} beyond {place}",
    "{prefix+}{subject} upon {place}",

    # Nested of-and
    "{subject} of {thing} and {place}",
    "{subject} of {place} and {thing}",

    # Suffix chains
    "{adj} {adj}{suf} of {place}",
    "{adj_sup} {noun}{suf} of {thing}",
    "{prefix+}{adj}{suf} {subject}",
    "{adj}{suf} of {place}, {adj_sup}",
    "{adj}{suf} and {adj}{suf}",
]

insane = [
    # Triple adjectives
    "{adj} {adj} {adj} {subject3}",
    "{adj} {adj} {adj} {subject3} of {place}",
    "{adj} {adj} {adj} {subject3} of {thing}",

    # Deep prefix stacks
    "{prefix+}{prefix+}{subject3}",
    "{prefix+} {prefix+} {subject3} of {place}",

    # Many coordinated clauses
    "{subject3} of {place} and {place} and {place}",
    "{subject3} and {subject3} and {subject3}",

    # Roman numeral + place
    "{subject3} {roman_numeral} of {place}",

    # Number/ordinal as suffix
    "{subject3}-{roman_numeral}",

    # Mirror compounds
    "{prefix+}{subject3} of {prefix+}{subject3}",

    # Everything-at-once
    "{prefix+} {adj} {adj} {subject3} of {place} and {place}",
    "{adj_sup} {adj} {subject3} of {thing}, {adj_sup}",
    "{adj} {prefix+}{subject3} of {place}, {adj_sup}",
    "{thing} {prefix+}{adj} {subject3} of {place}",

    # Suffix madness
    "{prefix+}{suf} {adj} of {place} and {place}",
    "{adj_sup}{suf} {adj} {subject3} of {thing}",
    "{adj} {noun}{suf} and {noun}{suf} {subject3}",
    "{prefix+}{noun}{suf} of {place} and {thing}",
    "{prefix+}{noun}{suf} of {thing} and {place}",
    "{adj} {noun}{suf} {prefix+}{subject3}",
]
