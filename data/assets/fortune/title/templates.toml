# Generic high-level title templates.
#
# The core indirection is the ``subject`` slot defined in ``generic.toml``.
# A subject can be any interchangeable head: a rank, class, noun, or a
# compound of those (prefixed, adjectival, hyphenated, etc.).
#
# Templates combine subjects with raw slots (place, noun, ordinal, number)
# and other indirections as needed.
#
# Complexity levels:
#   simple    — short, readable, one or two slots
#   moderate  — a few more moving parts, compounds, ordinals
#   complex   — longer phrases, multiple clauses, prefix stacks
#   insane    — maximalist cross-flavor soup

simple = [
    # Subject
    "{subject}",
    "The {subject}",
    "{prefix}{subject}",

    # Direct rank / class (also reachable via {subject})
    "{rank}",
    "{class}",
    "{rank} {class}",
    "The {rank}",
    "The {class}",

    # Other simple
    "{noun} {subject}",
    "{noun} {prefix}{subject}",
    "The {noun}",
    "{entity:possessive} {subject}",

    # "X the Y" epithet
    "{entity} the {adj}",
    "{entity} the {subject}",

    # Possessive subject
    "{subject:possessive} {noun}",

    # Subject + prepositional phrase
    "{subject} of {entity}",
    "{subject} of {place}",
    "{subject} in {place}",
    "{subject} from {place}",
    "{subject} over {place}",
    "{subject} upon {place}",
    "{subject} near {place}",
    "{subject} under {place}",
    "{subject} within {place}",

    # Direct rank/class/noun
    "{rank} of {place}",
    "{rank} of {entity}",
    "{noun} {rank}",
    "{entity:possessive} {rank}",
    "{noun} {rank} of {place}",
    "{class} of {place}",
    "{class} of {entity}",
    "{entity:possessive} {class}",
    "{noun} {class}",
    "{noun} {class} of {place}",
    "{entity:possessive} {noun}",

    # Descriptors
    "The {adj}",
    "The {adj_sup}",

    # Modified
    "{adj} {subject}",
    "{adj} {subject}",
    "{adj} {rank}",
    "{adj} {class}",
    "{adj_sup} {subject}",
    "{adj_sup} {rank}",
    "{adj_sup} {class}",
    "The {adj} {subject}",
    "The {adj} {subject}",
    "The {adj} {subject}",
    "The {adj} {rank}",
    "The {adj} {class}",
    "The {adj_sup} {subject}",
    "The {adj_sup} {rank}",
    "The {adj_sup} {class}",

    # Attributive place in front
    "{place} {subject}",

    # Numbers/oridnals subject
    "{subject} {roman_numeral}",
    "{subject} {number}",
    "{ordinal} {subject}",

    # Prefix compounds (short, natural)
    "{prefix}{noun}",
    "{prefix}{rank}",
    "{prefix}{class}",
    "The {prefix}{noun}",
    "The {prefix}{rank}",
    "The {prefix}{class}",

    # Suffix compounds (short, natural)
    "{noun}{suffix}",
    "{noun}{suffix}",
    "{place}{suffix}",
    "{rank}{suffix}",
    "{class}{suffix}",
]

moderate = [
    # Coordination
    "{subject} of {place} and {place}",
    "{subject} of {place}, {subject}",
    "{adj} {subject;0}, {adj} {subject;0}",
    "{subject;0}! {subject;0}!",
    "{rank} and {rank}",
    "{rank} of {place} and {place}",

    # (adjective)
    "{subject} ({adj})",
    "{subject} ({adj_sup})",

    "{adj} {rank} ({adj})",
    "{adj} {class} ({adj})",
    "{adj} {rank} ({adj_sup})",
    "{adj} {class} ({adj_sup})",

    "{prefix}{subject} ({adj})",
    "{prefix}{subject} ({adj_sup})",
    "{prefix}{noun} ({adj})",
    "{prefix}{noun} ({adj_sup})",

    "{noun}{suffix} ({adj})",
    "{noun}{suffix} ({adj_sup})",

    # More descriptors
    "{adj} {rank} {subject}",
    "{adj_sup} {subject}",
    "{adj_sup} {adj} {subject}",
    "{adj} {adj} {subject}",
    "{adj} {adj} {subject}",
    "{adj} {adj} {subject}",
    "{adj} {adj} {rank}",
    "{adj} {adj} {class}",

    # Prefix stacks on the subject
    "{prefix+} {subject}",

    # Modified subject + prepositional phrase
    "{adj} {subject} of {place}",
    "{adj_sup} {subject} of {place}",
    "{adj}, {adj} {subject}",
    "{adj}, {adj_sup} {subject}",

    # Prepositional phrases
    "{subject} before {noun}",
    "{class}-{rank} against {place}",

    # Place attribution with adjective
    "{adj} {place:possessive} {subject}",
    "{adj} {place:possessive} {adj} {subject}",
    "{adj} {place:possessive} {adj_sup} {subject}",
    "{adj_sup} {place}'s {adj_sup} {subject}",
    "{place:possessive} {adj_sup} {subject}",
    "{place:possessive} {adj_sup} {subject} ({adj})",

    # Suffix compounds
    "{adj} {adj}{suffix}",
    "{adj_sup} {adj}{suffix}",
    "{adj}{suffix} of {place} and {place}",
    "{adj}{suffix} of {entity}, {adj_sup}",
    "{prefix+}{noun}{suffix}",
    "{rank}{suffix} of {place}",
    "{class}{suffix}, {rank}",

    # Modifier-driven templates
    "{adj} {noun} of {place}",
    "{noun:possessive} {subject}",

    # "X the Y" epithet
    "{entity} the {adj_sup}",
    "{entity} the {adj} {subject}",

    # Modified of-phrases
    "{subject} of the {adj} {noun}",
    "{rank} of the {adj} {noun}",

    # Colon subtitles
    "{subject}: The {adj} {noun}",
    "{subject}: Part {number}",

    # Possessive subject
    "{subject:possessive} {adj} {noun}",
    "{rank:possessive} {noun}{suffix}",
]

complex = [
    # Multi-clause coordination
    "{subject} of {place} and {subject} of {place}",
    "{subject} of {noun:plural} and {subject} of {entity}",

    # Heavy modification
    "{adj} {adj} {subject} of {place}",
    "{adj} {adj} {subject} of {noun:plural}",
    "{adj} {adj} {subject} of {entity}",
    "{prefix+}, {adj} {subject}",
    "{adj_sup} {subject;0}, {adj_sup} {subject;0}",
    "{adj_sup} {subject}, {adj_sup} {subject}",
    "{adj} {subject;0}, {adj} {subject;0}, {adj} {subject;0}",
    "{adj} {subject}, {adj} {subject}, {adj} {subject}",
    "{adj_sup} {prefix}{subject}, {adj_sup} {prefix}{subject}",
    "{subject;0}! {subject;0}! {subject;0}!",
    "{subject}? {subject}!",

    # Prefix stack + subject + prepositional phrase
    "{prefix+}{subject} of {place}",
    "{prefix+}{subject} of {noun:plural}",
    "{prefix+}{subject} of {entity}",

    # Appositive-style
    "{subject}, {adj_sup}",
    "{subject}, {adj} {subject}",
    "{rank} {subject}, {adj_sup}",

    # Locative/attributive place before subject
    "{adj} {place} {subject}",

    # Prepositional phrases
    "{subject} against {place}",
    "{subject} against {entity}",
    "{subject} beyond {place}",
    "{prefix+}{subject} upon {place}",

    # Nested of-and
    "{noun} {subject} of {entity} from {place}",
    "{subject} of {entity} and {entity}",

    # Suffix chains
    "{adj} {adj}{suffix} of {place}",
    "{adj_sup} {noun}{suffix} of {noun:plural}",
    "{adj_sup} {noun}{suffix} of {entity}",
    "{prefix+}{suffix} {subject}",
    "{adj}{suffix} of {place}, {adj_sup}",
    "{adj}{suffix} and {adj}{suffix}",

    # Modifier-driven templates
    "{adj_sup} {noun} of {place}",
    "{noun:possessive} {subject} of {place}",
    "{ordinal} {adj} {subject}",

    # Modified of-phrases
    "{subject} of the {adj_sup} {noun}",
    "{adj} {subject} of the {adj} {noun}",

    # Colon subtitles
    "{noun}: The {subject} {roman_numeral}",
    "{subject}: The {adj} {subject} of {place}",
]

insane = [
    # Triple adjectives
    "{adj} {adj} {adj} {subject3}",
    "{adj} {adj} {adj} {subject3} of {place}",
    "{adj} {adj} {adj} {subject3} of {noun:plural}",

    # Deep prefix stacks
    "{prefix+}{prefix+}{subject3}",
    "{prefix+} {prefix+} {subject3} of {place}",

    # Many coordinated clauses
    "{subject3} of {place} and {place} and {place}",
    "{subject3} and {subject3} and {subject3}",
    "{subject3} of {entity}, {entity}, and {entity}",

    # Roman numeral + place
    "{subject3} {roman_numeral} of {place}",

    # Number/ordinal as suffix
    "{subject3}-{roman_numeral}",

    # Mirror compounds
    "{prefix+}{subject3} of {prefix+}{subject3}",

    # Everything-at-once
    "{prefix+} {adj} {adj} {subject3} of {prefix}{place} and {place}",
    "{adj_sup} {adj} {subject3} of {noun:plural}, {adj_sup}",
    "{adj} {prefix+}{subject3} of {place}, {adj_sup}",
    "{noun} {prefix+}, {adj} {subject3} of {place}",

    # Suffix madness
    "{prefix+}{suffix} {adj} of {place} and {place}",
    "{adj_sup}{suffix} {adj} {subject3} of {noun:plural}",
    "{adj} {noun}{suffix} and {noun}{suffix} {subject3}",
    "{prefix+}{noun}{suffix} of {place} and {noun:plural}",
    "{prefix+}{noun}{suffix} of {noun:plural} and {place}",
    "{adj} {noun}{suffix} {prefix+}{subject3}",

    # Modifier-driven templates
    "{adj_sup} {adj_sup} {noun:plural}",
    "{ordinal} {adj_sup} {subject} of {place}",
    "{noun:possessive} {subject3} of {place}",
    "{subject;0}? {subject;0}? {subject;1}!",

    # Entity
    "{entity}",
    "{adj_sup} {entity}",
    "{prefix+} {entity}",
    "{entity} of {place}",

    # Fun
    "{adj_sup} {subject} (formerly {adj} {subject})",
    "{entity} (formerly {adj_sup} {entity})",
    "{subject} of {place} (hates {place})",
    "{subject} of {prefix}{place} (hates {place})",
    "{subject} (hates {entity})",
    "{subject} (loves {entity})",
    "{entity} (hates {place})",
    "{entity} (loves {place})",
    "{entity} (hates {noun:plural})",
    "{entity} (loves {noun:plural})",
    "{subject} (actually {subject} in disguise)",
    "{subject} (actually {entity} in disguise)",
    "{entity} (actually {subject} in disguise)",
    "{entity} (actually {entity} in disguise)",

    "Two {noun:plural}",
    "{number} {noun:plural}",
    "{number} {noun:plural} (used to be {number})",

    "Two {subject:plural}",
    "{number} {subject:plural}",
    "{number} {subject:plural} (used to be {number})",

    "Two {entity:plural}",
    "{number} {entity:plural}",
    "{number} {entity:plural} (used to be {number})",

    "\"{subject}\"",
    "\"{entity}\"",
    "\"{entity}\" (in scare quotes)",
    "\"{adj}\" (in scare quotes)",

    # More parentheticals
    "{subject} (no relation)",
    "{entity} (no relation)",
    "{subject} (retired)",
    "{subject} (the other one)",
    "{subject} (season {number})",
    "{subject} (remastered)",
]
